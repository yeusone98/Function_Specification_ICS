<svg width="1800" height="1160" viewBox="0 0 1800 1160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart thiết lập bài kiểm tra đầu vào dành cho ứng viên thực hiện trước phỏng vấn">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.08; }
      .lane-system { fill: #378add; opacity: 0.11; }
      .lane-peer { fill: #378add; opacity: 0.08; }
      .lane-candidate { fill: #378add; opacity: 0.09; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-error { fill: #e54848; stroke: #b52f2f; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #f5a623; stroke: #d97706; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #3b2400;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="450" height="1106"/>
  <rect class="lane-system" x="450" y="54" width="450" height="1106"/>
  <rect class="lane-peer" x="900" y="54" width="450" height="1106"/>
  <rect class="lane-candidate" x="1350" y="54" width="450" height="1106"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1158.8"/>
  <line class="divider" x1="450" y1="0" x2="450" y2="1160"/>
  <line class="divider" x1="900" y1="0" x2="900" y2="1160"/>
  <line class="divider" x1="1350" y1="0" x2="1350" y2="1160"/>

  <rect class="lane-head" x="0" y="0" width="450" height="54"/>
  <rect class="lane-head" x="450" y="0" width="450" height="54"/>
  <rect class="lane-head" x="900" y="0" width="450" height="54"/>
  <rect class="lane-head" x="1350" y="0" width="450" height="54"/>

  <text class="lane-title" x="225" y="27">Người phụ trách</text>
  <text class="lane-title" x="675" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1125" y="27">Handler khác</text>
  <text class="lane-title" x="1575" y="27">Ứng viên</text>

  <ellipse class="start-end" cx="225" cy="102" rx="96" ry="28"/>
  <text class="text-dark" x="225" y="107">Bắt đầu</text>

  <rect class="task" x="65" y="160" width="320" height="82" rx="8"/>
  <text class="text-light" x="225" y="192">
    <tspan x="225" dy="0">Chọn vị trí và vào tab</tspan>
    <tspan x="225" dy="16">K.Tra đầu vào</tspan>
  </text>

  <rect class="task" x="515" y="160" width="320" height="82" rx="8"/>
  <text class="text-light" x="675" y="192">
    <tspan x="675" dy="0">Hiển thị danh sách bài kiểm tra</tspan>
    <tspan x="675" dy="16">và mode Tạo / Đáp án</tspan>
  </text>

  <polygon class="decision" points="675,300 785,370 675,440 565,370"/>
  <text class="decision-text" x="675" y="366">
    <tspan x="675" dy="0">Có bài kiểm tra?</tspan>
  </text>

  <rect class="result-error" x="515" y="468" width="320" height="112" rx="8"/>
  <text class="text-light" x="675" y="500">
    <tspan x="675" dy="0">Không có bài kiểm tra</tspan>
    <tspan class="subtext" x="675" dy="18">Hiển thị nút Thêm bài kiểm tra mới</tspan>
    <tspan class="meta-text" x="675" dy="18">Ứng viên chưa có nội dung để làm</tspan>
  </text>

  <rect class="task" x="65" y="620" width="320" height="82" rx="8"/>
  <text class="text-light" x="225" y="652">
    <tspan x="225" dy="0">Chọn chế độ Tạo / Đáp án</tspan>
    <tspan x="225" dy="16">và mở danh mục câu hỏi</tspan>
  </text>

  <rect class="task" x="515" y="620" width="320" height="92" rx="8"/>
  <text class="text-light" x="675" y="652">
    <tspan x="675" dy="0">Hiển thị trình soạn thảo</tspan>
    <tspan x="675" dy="16">và loại câu hỏi</tspan>
    <tspan class="subtext" x="675" dy="16">Media / Trắc nghiệm / Checkbox / Dropdown / Văn bản</tspan>
  </text>

  <rect class="result-ok" x="965" y="620" width="320" height="92" rx="8"/>
  <text class="text-light" x="1125" y="652">
    <tspan x="1125" dy="0">Handler khác thấy cấu hình mới</tspan>
    <tspan x="1125" dy="16">trong cùng vị trí tuyển dụng</tspan>
  </text>

  <rect class="result-ok" x="1385" y="620" width="320" height="104" rx="8"/>
  <text class="text-light" x="1545" y="652">
    <tspan x="1545" dy="0">Ứng viên nhận bài kiểm tra</tspan>
    <tspan x="1545" dy="16">để làm trực tuyến trước phỏng vấn</tspan>
    <tspan class="meta-text" x="1545" dy="18">Cơ chế auto-save từng câu hỏi</tspan>
  </text>

  <ellipse class="start-end" cx="1545" cy="920" rx="96" ry="28"/>
  <text class="text-dark" x="1545" y="925">Kết thúc</text>

  <line class="line" x1="225" y1="130" x2="225" y2="160"/>
  <line class="line" x1="385" y1="201" x2="515" y2="201"/>
  <line class="line" x1="675" y1="242" x2="675" y2="300"/>
  <line class="line" x1="675" y1="440" x2="675" y2="468"/>
  <path class="line" d="M565 370 H410 V600 H225 V620"/>
  <path class="line" d="M675 580 V600 H225 V620"/>
  <line class="line" x1="385" y1="661" x2="515" y2="661"/>
  <line class="line" x1="835" y1="661" x2="965" y2="661"/>
  <line class="line" x1="1285" y1="666" x2="1385" y2="666"/>
  <line class="line" x1="1545" y1="724" x2="1545" y2="892"/>

  <text class="line-label" x="450" y="190" text-anchor="middle">Mở bài kiểm tra</text>
  <text class="line-label" x="706" y="454">Không</text>
  <text class="line-label" x="488" y="356" text-anchor="middle">Có</text>
  <text class="line-label" x="450" y="608" text-anchor="middle">Soạn thảo</text>
  <text class="line-label" x="1335" y="650" text-anchor="middle">Đồng bộ</text>
</svg>
