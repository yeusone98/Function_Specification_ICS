<svg width="1600" height="1380" viewBox="0 0 1600 1380" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart truy vấn và kế thừa dữ liệu ứng viên cũ">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1326"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1326"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1326"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1378.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1380"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1380"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Popup / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Nhấn nút (+) tại</tspan>
    <tspan x="260" dy="16">Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="164" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="194">
    <tspan x="780" dy="0">Hiển thị popup</tspan>
    <tspan x="780" dy="16">Thêm ứng viên mới</tspan>
  </text>

  <rect class="task" x="120" y="324" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="350">
    <tspan x="260" dy="0">Tick chọn</tspan>
    <tspan x="260" dy="16">ứng viên có sẵn</tspan>
  </text>

  <rect class="task" x="620" y="320" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="350">
    <tspan x="780" dy="0">Đổi ô Email thành dropdown</tspan>
    <tspan x="780" dy="16">để tìm kiếm ứng viên từ CSDL</tspan>
  </text>

  <polygon class="decision" points="780,418 884,492 780,566 676,492"/>
  <text class="decision-text" x="780" y="488">
    <tspan x="780" dy="0">Có ứng viên</tspan>
    <tspan x="780" dy="16">trong CSDL?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="446" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="476">
    <tspan x="1320" dy="0">Không có ứng viên nào!</tspan>
    <tspan class="subtext" x="1320" dy="18">Dropdown Gmail hiển thị empty state</tspan>
  </text>

  <rect class="task" x="120" y="620" width="280" height="70" rx="8"/>
  <text class="text-light" x="260" y="650">
    <tspan x="260" dy="0">Tìm kiếm và chọn</tspan>
    <tspan x="260" dy="16">một Gmail có sẵn</tspan>
  </text>

  <rect class="task" x="620" y="620" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="650">
    <tspan x="780" dy="0">Tự động điền Họ tên</tspan>
    <tspan x="780" dy="16">và Ngày tháng năm sinh nếu có</tspan>
  </text>

  <rect class="result-ok" x="1070" y="592" width="500" height="122" rx="8"/>
  <text class="text-light" x="1320" y="622">
    <tspan x="1320" dy="0">Popup thay đổi giao diện</tspan>
    <tspan class="subtext" x="1320" dy="18">Dữ liệu ứng viên cũ được kế thừa tự động</tspan>
    <tspan class="meta-text" x="1320" dy="18">Giữ lại cơ chế nhập các trường còn thiếu</tspan>
  </text>

  <rect class="task" x="620" y="784" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="814">
    <tspan x="780" dy="0">Mở dropdown Vị trí</tspan>
    <tspan x="780" dy="16">trên popup</tspan>
  </text>

  <polygon class="decision" points="780,882 884,956 780,1030 676,956"/>
  <text class="decision-text" x="780" y="952">
    <tspan x="780" dy="0">Có vị trí</tspan>
    <tspan x="780" dy="16">khả dụng?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="910" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="940">
    <tspan x="1320" dy="0">Không có vị trí khả dụng!</tspan>
    <tspan class="subtext" x="1320" dy="18">Dropdown vị trí hiển thị empty state</tspan>
  </text>

  <rect class="result-ok" x="1070" y="1080" width="500" height="118" rx="8"/>
  <text class="text-light" x="1320" y="1110">
    <tspan x="1320" dy="0">Sẵn sàng tiếp tục tạo đơn ứng tuyển</tspan>
    <tspan class="subtext" x="1320" dy="18">Popup đã có dữ liệu kế thừa từ ứng viên cũ</tspan>
    <tspan class="meta-text" x="1320" dy="18">Tiếp tục flow tạo đơn ứng tuyển ở chức năng 1.8</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1304" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1309">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="400" y1="199" x2="620" y2="199"/>
  <path class="line" d="M780 234 V292 H260 V324"/>
  <line class="line" x1="400" y1="355" x2="620" y2="355"/>
  <line class="line" x1="780" y1="390" x2="780" y2="418"/>
  <line class="line" x1="884" y1="492" x2="1110" y2="492"/>
  <path class="line" d="M780 566 V592 H260 V620"/>
  <line class="line" x1="400" y1="655" x2="620" y2="655"/>
  <line class="line" x1="940" y1="655" x2="1070" y2="655"/>
  <line class="line" x1="780" y1="690" x2="780" y2="784"/>
  <line class="line" x1="780" y1="854" x2="780" y2="882"/>
  <line class="line" x1="884" y1="956" x2="1110" y2="956"/>
  <path class="line" d="M780 1030 V1139 H1070"/>
  <line class="line" x1="1320" y1="1198" x2="1320" y2="1276"/>

  <text class="line-label" x="950" y="478">Không</text>
  <text class="line-label" x="796" y="592">Có</text>
  <text class="line-label" x="950" y="942">Không</text>
  <text class="line-label" x="796" y="1046">Có</text>
</svg>
