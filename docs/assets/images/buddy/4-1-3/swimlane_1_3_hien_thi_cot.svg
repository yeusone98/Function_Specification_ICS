<svg width="1600" height="1600" viewBox="0 0 1600 1600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart mục 1.3">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-dashed {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 7 4;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="500" height="1546"/>
  <rect class="lane-system" x="500" y="54" width="500" height="1546"/>
  <rect class="lane-result" x="1000" y="54" width="600" height="1546"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1598.8"/>
  <line class="divider" x1="500" y1="0" x2="500" y2="1600"/>
  <line class="divider" x1="1000" y1="0" x2="1000" y2="1600"/>

  <rect class="lane-head" x="0" y="0" width="500" height="54"/>
  <rect class="lane-head" x="500" y="0" width="500" height="54"/>
  <rect class="lane-head" x="1000" y="0" width="600" height="54"/>

  <text class="lane-title" x="250" y="27">Người phụ trách</text>
  <text class="lane-title" x="750" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1300" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="250" cy="112" rx="96" ry="28"/>
  <text class="text-dark" x="250" y="117">Bắt đầu</text>

  <rect class="task" x="110" y="174" width="280" height="62" rx="8"/>
  <text class="text-light" x="250" y="200">
    <tspan x="250" dy="0">Đang xem bảng</tspan>
    <tspan x="250" dy="16">Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="110" y="292" width="280" height="62" rx="8"/>
  <text class="text-light" x="250" y="318">
    <tspan x="250" dy="0">Nhấn biểu tượng</tspan>
    <tspan x="250" dy="16">👁️ hiển thị cột</tspan>
  </text>

  <rect class="task" x="610" y="292" width="280" height="62" rx="8"/>
  <text class="text-light" x="750" y="318">
    <tspan x="750" dy="0">Render popup chọn</tspan>
    <tspan x="750" dy="16">cột hiển thị</tspan>
  </text>

  <rect class="task" x="1090" y="250" width="420" height="156" rx="8"/>
  <text class="text-light" x="1300" y="278">
    <tspan x="1300" dy="0">Popup CHỌN CỘT HIỂN THỊ</tspan>
    <tspan class="subtext" x="1300" dy="18">10 cột khả dụng</tspan>
    <tspan class="subtext" x="1300" dy="16">Vị trí PV · Trạng thái · Phỏng vấn</tspan>
    <tspan class="subtext" x="1300" dy="16">Đào tạo · Ngày gửi CV · Ngày PV</tspan>
    <tspan class="subtext" x="1300" dy="16">Ngày hết HĐ · Ngày sinh · Training</tspan>
    <tspan class="meta-text" x="1300" dy="18">Checkbox cột hiển thị</tspan>
  </text>

  <rect class="task" x="110" y="520" width="280" height="70" rx="8"/>
  <text class="text-light" x="250" y="550">
    <tspan x="250" dy="0">Check / uncheck</tspan>
    <tspan x="250" dy="16">các cột hiển thị</tspan>
  </text>

  <rect class="task" x="600" y="520" width="320" height="70" rx="8"/>
  <text class="text-light" x="760" y="550">
    <tspan x="760" dy="0">Re-render bảng theo</tspan>
    <tspan x="760" dy="16">checkbox onChange</tspan>
  </text>

  <rect class="task" x="600" y="644" width="320" height="70" rx="8"/>
  <text class="text-light" x="760" y="674">
    <tspan x="760" dy="0">Lưu cấu hình cột vào</tspan>
    <tspan x="760" dy="16">User Preferences</tspan>
  </text>

  <polygon class="decision" points="760,792 864,868 760,944 656,868"/>
  <text class="decision-text" x="760" y="864">
    <tspan x="760" dy="0">Bảng có dữ liệu</tspan>
    <tspan x="760" dy="16">ứng viên?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="826" width="380" height="82" rx="8"/>
  <text class="text-light" x="1300" y="856">
    <tspan x="1300" dy="0">Bảng dữ liệu trống!</tspan>
    <tspan class="subtext" x="1300" dy="18">Vẫn hỗ trợ toggle hiển thị cột</tspan>
  </text>

  <rect class="result-ok" x="1090" y="1010" width="420" height="132" rx="8"/>
  <text class="text-light" x="1300" y="1038">
    <tspan x="1300" dy="0">Hiển thị bảng theo cột đã chọn</tspan>
    <tspan class="subtext" x="1300" dy="18">Chỉ render các cột được tích</tspan>
    <tspan class="subtext" x="1300" dy="16">Các cột bỏ chọn bị ẩn</tspan>
    <tspan class="subtext" x="1300" dy="16">Áp dụng ngay trên bảng ứng viên</tspan>
    <tspan class="meta-text" x="1300" dy="18">Cấu hình lưu riêng theo tài khoản</tspan>
  </text>

  <rect class="task" x="110" y="1368" width="300" height="86" rx="8"/>
  <text class="text-light" x="260" y="1414">
    <tspan x="260" dy="0">Xem kết quả hiển thị</tspan>
    <tspan x="260" dy="16">trên bảng ứng viên</tspan>
  </text>

  <ellipse class="start-end" cx="260" cy="1528" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="1533">Kết thúc</text>

  <line class="line" x1="250" y1="140" x2="250" y2="174"/>
  <line class="line" x1="250" y1="236" x2="250" y2="292"/>
  <line class="line" x1="390" y1="323" x2="610" y2="323"/>
  <line class="line" x1="890" y1="323" x2="1090" y2="323"/>
  <path class="line" d="M1300 406 V454 H250 V520"/>
  <line class="line" x1="390" y1="555" x2="600" y2="555"/>
  <line class="line" x1="760" y1="590" x2="760" y2="644"/>
  <line class="line" x1="760" y1="714" x2="760" y2="792"/>
  <path class="line-dashed" d="M864 868 H1110"/>
  <path class="line" d="M760 944 V1076 H1090"/>
  <path class="line" d="M1090 1076 H460 V1411 H410"/>
  <path class="line" d="M1490 867 H1560 V1438 H410"/>
  <line class="line" x1="260" y1="1454" x2="260" y2="1500"/>

  <text class="line-label" x="1010" y="308">Mở popup cột</text>
  <text class="line-label" x="760" y="438">Chọn cột</text>
  <text class="line-label" x="930" y="854">Không</text>
  <text class="line-label" x="774" y="986">Có</text>
</svg>
