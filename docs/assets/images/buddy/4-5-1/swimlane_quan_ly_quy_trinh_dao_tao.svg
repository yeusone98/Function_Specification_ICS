<svg width="1800" height="1120" viewBox="0 0 1800 1120" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart quản lý quy trình đào tạo">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.08; }
      .lane-system { fill: #378add; opacity: 0.11; }
      .lane-trainer { fill: #378add; opacity: 0.09; }
      .lane-trainee { fill: #378add; opacity: 0.09; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-error { fill: #e54848; stroke: #b52f2f; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #f5a623; stroke: #d97706; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #3b2400;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-anchor: middle;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="420" height="1066"/>
  <rect class="lane-system" x="420" y="54" width="460" height="1066"/>
  <rect class="lane-trainer" x="880" y="54" width="460" height="1066"/>
  <rect class="lane-trainee" x="1340" y="54" width="460" height="1066"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1118.8"/>
  <line class="divider" x1="420" y1="0" x2="420" y2="1120"/>
  <line class="divider" x1="880" y1="0" x2="880" y2="1120"/>
  <line class="divider" x1="1340" y1="0" x2="1340" y2="1120"/>

  <rect class="lane-head" x="0" y="0" width="420" height="54"/>
  <rect class="lane-head" x="420" y="0" width="460" height="54"/>
  <rect class="lane-head" x="880" y="0" width="460" height="54"/>
  <rect class="lane-head" x="1340" y="0" width="460" height="54"/>

  <text class="lane-title" x="210" y="27">Người phụ trách</text>
  <text class="lane-title" x="650" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1110" y="27">Trainer</text>
  <text class="lane-title" x="1570" y="27">Trainee</text>

  <ellipse class="start-end" cx="210" cy="102" rx="96" ry="28"/>
  <text class="text-dark" x="210" y="107">Bắt đầu</text>

  <rect class="task" x="60" y="160" width="300" height="82" rx="8"/>
  <text class="text-light" x="210" y="192">
    <tspan x="210" dy="0">Chọn vị trí</tspan>
    <tspan x="210" dy="16">vào tab Quy trình</tspan>
  </text>

  <rect class="task" x="500" y="160" width="300" height="82" rx="8"/>
  <text class="text-light" x="650" y="192">
    <tspan x="650" dy="0">Tải danh sách quy trình</tspan>
    <tspan x="650" dy="16">và trạng thái kích hoạt</tspan>
  </text>

  <polygon class="decision" points="650,312 760,382 650,452 540,382"/>
  <text class="decision-text" x="650" y="378">
    <tspan x="650" dy="0">Có quy trình?</tspan>
  </text>

  <rect class="result-error" x="60" y="310" width="300" height="112" rx="8"/>
  <text class="text-light" x="210" y="344">
    <tspan x="210" dy="0">Danh sách quy trình trống</tspan>
    <tspan class="subtext" x="210" dy="18">Hiển thị nút Thêm quy trình mới</tspan>
    <tspan class="meta-text" x="210" dy="18">Cho phép bắt đầu tạo quy trình đầu tiên</tspan>
  </text>

  <rect class="task" x="60" y="520" width="300" height="92" rx="8"/>
  <text class="text-light" x="210" y="552">
    <tspan x="210" dy="0">Thêm / sửa / xóa</tspan>
    <tspan x="210" dy="16">và bật hoặc tắt quy trình</tspan>
  </text>

  <rect class="task" x="60" y="700" width="300" height="92" rx="8"/>
  <text class="text-light" x="210" y="732">
    <tspan x="210" dy="0">Thêm danh mục công việc</tspan>
    <tspan x="210" dy="16">và chọn loại action</tspan>
  </text>

  <rect class="task" x="500" y="700" width="300" height="100" rx="8"/>
  <text class="text-light" x="650" y="732">
    <tspan x="650" dy="0">Lưu quy trình, danh mục</tspan>
    <tspan x="650" dy="16">và loại action</tspan>
    <tspan class="meta-text" x="650" dy="18">Cập nhật dữ liệu thành công</tspan>
  </text>

  <rect class="result-ok" x="950" y="700" width="320" height="100" rx="8"/>
  <text class="text-light" x="1110" y="732">
    <tspan x="1110" dy="0">Trainer thấy quy trình</tspan>
    <tspan class="subtext" x="1110" dy="18">và toàn bộ nội dung được kích hoạt</tspan>
    <tspan class="meta-text" x="1110" dy="18">Không sửa dữ liệu đã có sẵn</tspan>
  </text>

  <rect class="result-ok" x="1410" y="700" width="320" height="100" rx="8"/>
  <text class="text-light" x="1570" y="732">
    <tspan x="1570" dy="0">Trainee thấy nội dung</tspan>
    <tspan class="subtext" x="1570" dy="18">được công khai theo quyền</tspan>
    <tspan class="meta-text" x="1570" dy="18">Ẩn nội dung không dành cho Trainee</tspan>
  </text>

  <ellipse class="start-end" cx="1570" cy="980" rx="96" ry="28"/>
  <text class="text-dark" x="1570" y="985">Kết thúc</text>

  <line class="line" x1="210" y1="130" x2="210" y2="160"/>
  <line class="line" x1="360" y1="201" x2="500" y2="201"/>
  <line class="line" x1="650" y1="242" x2="650" y2="312"/>
  <line class="line" x1="540" y1="382" x2="360" y2="382"/>
  <path class="line" d="M210 422 V520"/>
  <path class="line" d="M650 452 V486 H40 V566 H60"/>
  <line class="line" x1="210" y1="612" x2="210" y2="700"/>
  <line class="line" x1="360" y1="746" x2="500" y2="746"/>
  <line class="line" x1="800" y1="746" x2="950" y2="746"/>
  <line class="line" x1="1270" y1="746" x2="1410" y2="746"/>
  <line class="line" x1="1570" y1="800" x2="1570" y2="952"/>

  <text class="line-label" x="430" y="188">Mở quy trình</text>
  <text class="line-label" x="450" y="368">Không</text>
  <text class="line-label" x="650" y="470">Có</text>
  <text class="line-label" x="1340" y="732">Đồng bộ</text>
</svg>
