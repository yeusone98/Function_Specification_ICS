<svg width="1600" height="1560" viewBox="0 0 1600 1560" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart tạo vòng phỏng vấn ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1506"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1506"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1506"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1558.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1560"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1560"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Lịch phỏng vấn / Popup / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Chọn một ứng viên</tspan>
    <tspan x="260" dy="16">trong Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="164" width="320" height="78" rx="8"/>
  <text class="text-light" x="780" y="194">
    <tspan x="780" dy="0">Điều hướng tới chi tiết ứng viên</tspan>
    <tspan x="780" dy="16">và mặc định trỏ vào tab Thông tin</tspan>
  </text>

  <rect class="task" x="120" y="312" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="338">
    <tspan x="260" dy="0">Chọn tab</tspan>
    <tspan x="260" dy="16">Phỏng vấn</tspan>
  </text>

  <rect class="task" x="620" y="304" width="320" height="86" rx="8"/>
  <text class="text-light" x="780" y="334">
    <tspan x="780" dy="0">Tải lịch phỏng vấn và các vòng</tspan>
    <tspan x="780" dy="16">đã được thiết lập sẵn cho vị trí tuyển dụng</tspan>
  </text>

  <polygon class="decision" points="780,430 884,504 780,578 676,504"/>
  <text class="decision-text" x="780" y="500">
    <tspan x="780" dy="0">Có vòng phỏng vấn</tspan>
    <tspan x="780" dy="16">được tạo sẵn?</tspan>
  </text>

  <rect class="result-empty" x="1070" y="450" width="500" height="108" rx="8"/>
  <text class="text-light" x="1320" y="480">
    <tspan x="1320" dy="0">Không có dữ liệu!</tspan>
    <tspan class="subtext" x="1320" dy="18">Không có vòng phỏng vấn nào được thiết lập sẵn</tspan>
  </text>

  <rect class="task" x="120" y="636" width="280" height="78" rx="8"/>
  <text class="text-light" x="260" y="666">
    <tspan x="260" dy="0">Chọn một vòng phỏng vấn</tspan>
    <tspan x="260" dy="16">chưa được gán người phỏng vấn và thời gian</tspan>
  </text>

  <rect class="task" x="120" y="788" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="814">
    <tspan x="260" dy="0">Mở dropdown</tspan>
    <tspan x="260" dy="16">Người phỏng vấn</tspan>
  </text>

  <rect class="task" x="620" y="780" width="320" height="78" rx="8"/>
  <text class="text-light" x="780" y="810">
    <tspan x="780" dy="0">Hiển thị popup chọn ít nhất</tspan>
    <tspan x="780" dy="16">một hoặc nhiều người phỏng vấn</tspan>
  </text>

  <polygon class="decision" points="780,902 884,976 780,1050 676,976"/>
  <text class="decision-text" x="780" y="972">
    <tspan x="780" dy="0">Có người phỏng vấn</tspan>
    <tspan x="780" dy="16">khả dụng?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="930" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="960">
    <tspan x="1320" dy="0">Không có dữ liệu!</tspan>
    <tspan class="subtext" x="1320" dy="18">Dropdown Người phỏng vấn không có lựa chọn</tspan>
  </text>

  <rect class="task" x="120" y="1096" width="280" height="78" rx="8"/>
  <text class="text-light" x="260" y="1126">
    <tspan x="260" dy="0">Chọn người phỏng vấn</tspan>
    <tspan x="260" dy="16">và nhấn Xác nhận</tspan>
  </text>

  <rect class="task" x="120" y="1238" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="1264">
    <tspan x="260" dy="0">Chọn ngày giờ</tspan>
    <tspan x="260" dy="16">phỏng vấn</tspan>
  </text>

  <rect class="task" x="120" y="1360" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="1386">
    <tspan x="260" dy="0">Gán trạng thái</tspan>
    <tspan x="260" dy="16">của buổi phỏng vấn</tspan>
  </text>

  <rect class="task" x="620" y="1352" width="320" height="78" rx="8"/>
  <text class="text-light" x="780" y="1382">
    <tspan x="780" dy="0">Lưu dữ liệu, kích hoạt vòng phỏng vấn</tspan>
    <tspan x="780" dy="16">và nhận diện lịch nối tiếp nếu có</tspan>
  </text>

  <rect class="result-ok" x="1070" y="1280" width="500" height="170" rx="8"/>
  <text class="text-light" x="1320" y="1310">
    <tspan x="1320" dy="0">Hiển thị người phỏng vấn và thời gian trên vòng vừa kích hoạt</tspan>
    <tspan class="subtext" x="1320" dy="18">Layout lịch phỏng vấn được cập nhật cho tất cả role liên quan</tspan>
    <tspan class="subtext" x="1320" dy="16">Nếu có 2 vòng liên tiếp, popup chi tiết lịch hiển thị thêm vòng tiếp theo</tspan>
    <tspan class="meta-text" x="1320" dy="18">Ứng viên nhận được thông tin về vòng phỏng vấn mới</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1512" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1517">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="400" y1="199" x2="620" y2="199"/>
  <path class="line" d="M780 242 V282 H260 V312"/>
  <line class="line" x1="400" y1="343" x2="620" y2="343"/>
  <line class="line" x1="780" y1="390" x2="780" y2="430"/>
  <line class="line" x1="884" y1="504" x2="1070" y2="504"/>
  <path class="line" d="M780 578 V606 H260 V636"/>
  <line class="line" x1="260" y1="714" x2="260" y2="788"/>
  <line class="line" x1="400" y1="819" x2="620" y2="819"/>
  <line class="line" x1="780" y1="858" x2="780" y2="902"/>
  <line class="line" x1="884" y1="976" x2="1110" y2="976"/>
  <path class="line" d="M780 1050 V1068 H260 V1096"/>
  <line class="line" x1="260" y1="1174" x2="260" y2="1238"/>
  <line class="line" x1="260" y1="1300" x2="260" y2="1360"/>
  <line class="line" x1="400" y1="1391" x2="620" y2="1391"/>
  <line class="line" x1="940" y1="1391" x2="1070" y2="1391"/>
  <line class="line" x1="1320" y1="1450" x2="1320" y2="1484"/>

  <text class="line-label" x="948" y="490">Không</text>
  <text class="line-label" x="796" y="594">Có</text>
  <text class="line-label" x="950" y="962">Không</text>
  <text class="line-label" x="796" y="1066">Có</text>
</svg>
