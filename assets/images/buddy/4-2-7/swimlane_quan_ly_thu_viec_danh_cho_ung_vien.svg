<svg width="1800" height="1100" viewBox="0 0 1800 1100" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart quản lý thử việc dành cho ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-actor { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-role { fill: #378add; opacity: 0.07; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-actor" x="0" y="54" width="450" height="1046"/>
  <rect class="lane-system" x="450" y="54" width="450" height="1046"/>
  <rect class="lane-role" x="900" y="54" width="450" height="1046"/>
  <rect class="lane-result" x="1350" y="54" width="450" height="1046"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1098.8"/>
  <line class="divider" x1="450" y1="0" x2="450" y2="1100"/>
  <line class="divider" x1="900" y1="0" x2="900" y2="1100"/>
  <line class="divider" x1="1350" y1="0" x2="1350" y2="1100"/>

  <rect class="lane-head" x="0" y="0" width="450" height="54"/>
  <rect class="lane-head" x="450" y="0" width="450" height="54"/>
  <rect class="lane-head" x="900" y="0" width="450" height="54"/>
  <rect class="lane-head" x="1350" y="0" width="450" height="54"/>

  <text class="lane-title" x="225" y="27">Người phụ trách chính</text>
  <text class="lane-title" x="675" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1125" y="27">Các role khác</text>
  <text class="lane-title" x="1575" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="225" cy="100" rx="96" ry="28"/>
  <text class="text-dark" x="225" y="105">Bắt đầu</text>

  <rect class="task" x="75" y="160" width="300" height="88" rx="8"/>
  <text class="text-light" x="225" y="194">
    <tspan x="225" dy="0">Mở tab Thử việc và</tspan>
    <tspan x="225" dy="16">xem các nhóm nhiệm vụ, tiến độ X/Y</tspan>
  </text>

  <rect class="task" x="525" y="160" width="300" height="74" rx="8"/>
  <text class="text-light" x="675" y="190">
    <tspan x="675" dy="0">Tải lộ trình thử việc</tspan>
    <tspan x="675" dy="16">và các nhóm nhiệm vụ</tspan>
  </text>

  <polygon class="decision" points="675,320 785,390 675,460 565,390"/>
  <text class="decision-text" x="675" y="386">
    <tspan x="675" dy="0">Có lộ trình</tspan>
    <tspan x="675" dy="16">thử việc?</tspan>
  </text>

  <rect class="result-empty" x="1425" y="344" width="300" height="92" rx="8"/>
  <text class="text-light" x="1575" y="374">
    <tspan x="1575" dy="0">Không có dữ liệu thử việc!</tspan>
    <tspan class="subtext" x="1575" dy="18">Ứng viên chưa được gán lộ trình thử việc</tspan>
  </text>

  <rect class="task" x="75" y="560" width="300" height="124" rx="8"/>
  <text class="text-light" x="225" y="594">
    <tspan x="225" dy="0">Mở rộng nhóm nhiệm vụ</tspan>
    <tspan x="225" dy="16">tích chọn hoàn thành</tspan>
    <tspan x="225" dy="16">và nhập nhận xét cho từng tiêu chí</tspan>
  </text>

  <rect class="task" x="75" y="740" width="300" height="104" rx="8"/>
  <text class="text-light" x="225" y="774">
    <tspan x="225" dy="0">Thêm minh chứng</tspan>
    <tspan x="225" dy="16">upload file, chèn link</tspan>
    <tspan x="225" dy="16">và định dạng văn bản</tspan>
  </text>

  <rect class="task" x="525" y="760" width="300" height="88" rx="8"/>
  <text class="text-light" x="675" y="794">
    <tspan x="675" dy="0">Lưu log đánh giá</tspan>
    <tspan x="675" dy="16">và tính lại tiến độ X/Y</tspan>
  </text>

  <rect class="task" x="975" y="760" width="300" height="74" rx="8"/>
  <text class="text-light" x="1125" y="790">
    <tspan x="1125" dy="0">Các role khác</tspan>
    <tspan x="1125" dy="16">chỉ xem nội dung đồng bộ</tspan>
  </text>

  <rect class="result-ok" x="1425" y="730" width="300" height="170" rx="8"/>
  <text class="text-light" x="1575" y="760">
    <tspan x="1575" dy="0">Tiến độ thử việc cập nhật</tspan>
    <tspan class="subtext" x="1575" dy="18">Chỉ số X/Y thay đổi ngay sau khi lưu</tspan>
    <tspan class="subtext" x="1575" dy="16">Nhiệm vụ hiển thị Avatar/Tên người đánh giá</tspan>
    <tspan class="meta-text" x="1575" dy="18">Log thời gian hiển thị theo HH:mm - DD/MM/YYYY</tspan>
  </text>

  <ellipse class="start-end" cx="1575" cy="970" rx="96" ry="28"/>
  <text class="text-dark" x="1575" y="975">Kết thúc</text>

  <line class="line" x1="225" y1="128" x2="225" y2="160"/>
  <line class="line" x1="375" y1="204" x2="525" y2="204"/>
  <line class="line" x1="675" y1="234" x2="675" y2="320"/>
  <line class="line" x1="785" y1="390" x2="1425" y2="390"/>
  <path class="line" d="M675 460 V520 H225 V560"/>
  <line class="line" x1="225" y1="684" x2="225" y2="740"/>
  <line class="line" x1="375" y1="792" x2="525" y2="792"/>
  <line class="line" x1="825" y1="804" x2="975" y2="804"/>
  <line class="line" x1="1275" y1="797" x2="1425" y2="797"/>
  <line class="line" x1="1575" y1="900" x2="1575" y2="942"/>

  <text class="line-label" x="818" y="376">Không</text>
  <text class="line-label" x="691" y="488">Có</text>
</svg>
