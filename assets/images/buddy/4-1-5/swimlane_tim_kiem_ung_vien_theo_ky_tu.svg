<svg width="1600" height="1120" viewBox="0 0 1600 1120" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart tìm kiếm ứng viên theo ký tự">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1066"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1066"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1066"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1118.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1120"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1120"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Nhập ký tự vào</tspan>
    <tspan x="260" dy="16">ô tìm kiếm</tspan>
  </text>

  <rect class="task" x="620" y="164" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="194">
    <tspan x="780" dy="0">Bắt thay đổi keyword</tspan>
    <tspan x="780" dy="16">và chuẩn bị filter theo Họ và Tên</tspan>
  </text>

  <polygon class="decision" points="780,308 884,382 780,456 676,382"/>
  <text class="decision-text" x="780" y="378">
    <tspan x="780" dy="0">Keyword</tspan>
    <tspan x="780" dy="16">trống?</tspan>
  </text>

  <rect class="result-ok" x="1070" y="324" width="500" height="108" rx="8"/>
  <text class="text-light" x="1320" y="354">
    <tspan x="1320" dy="0">Hiển thị lại toàn bộ dữ liệu ban đầu</tspan>
    <tspan class="subtext" x="1320" dy="18">Không còn áp dụng điều kiện tìm kiếm</tspan>
  </text>

  <rect class="task" x="620" y="534" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="564">
    <tspan x="780" dy="0">Lọc danh sách theo</tspan>
    <tspan x="780" dy="16">Họ và Tên chứa keyword</tspan>
  </text>

  <polygon class="decision" points="780,688 884,762 780,836 676,762"/>
  <text class="decision-text" x="780" y="758">
    <tspan x="780" dy="0">Có kết quả</tspan>
    <tspan x="780" dy="16">khớp?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="716" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="746">
    <tspan x="1320" dy="0">Bảng dữ liệu trống!</tspan>
    <tspan class="subtext" x="1320" dy="18">Không có ứng viên khớp chuỗi ký tự đã nhập</tspan>
  </text>

  <rect class="result-ok" x="1070" y="918" width="500" height="108" rx="8"/>
  <text class="text-light" x="1320" y="948">
    <tspan x="1320" dy="0">Hiển thị danh sách ứng viên đã lọc</tspan>
    <tspan class="subtext" x="1320" dy="18">Chỉ giữ các record có Họ và Tên khớp keyword</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1082" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1087">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="400" y1="199" x2="620" y2="199"/>
  <line class="line" x1="780" y1="234" x2="780" y2="308"/>
  <line class="line" x1="884" y1="382" x2="1070" y2="382"/>
  <line class="line" x1="780" y1="456" x2="780" y2="534"/>
  <line class="line" x1="780" y1="604" x2="780" y2="688"/>
  <line class="line" x1="884" y1="762" x2="1110" y2="762"/>
  <path class="line" d="M780 836 V972 H1070"/>
  <line class="line" x1="1320" y1="1026" x2="1320" y2="1054"/>

  <text class="line-label" x="948" y="368">Có</text>
  <text class="line-label" x="796" y="490">Không</text>
  <text class="line-label" x="950" y="748">Không</text>
  <text class="line-label" x="796" y="868">Có</text>
</svg>
