<svg width="1800" height="1220" viewBox="0 0 1800 1220" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart quản lý thông tin chi tiết của ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-role { fill: #378add; opacity: 0.07; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="360" height="1166"/>
  <rect class="lane-system" x="360" y="54" width="360" height="1166"/>
  <rect class="lane-role" x="720" y="54" width="360" height="1166"/>
  <rect class="lane-role" x="1080" y="54" width="360" height="1166"/>
  <rect class="lane-result" x="1440" y="54" width="360" height="1166"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1218.8"/>
  <line class="divider" x1="360" y1="0" x2="360" y2="1220"/>
  <line class="divider" x1="720" y1="0" x2="720" y2="1220"/>
  <line class="divider" x1="1080" y1="0" x2="1080" y2="1220"/>
  <line class="divider" x1="1440" y1="0" x2="1440" y2="1220"/>

  <rect class="lane-head" x="0" y="0" width="360" height="54"/>
  <rect class="lane-head" x="360" y="0" width="360" height="54"/>
  <rect class="lane-head" x="720" y="0" width="360" height="54"/>
  <rect class="lane-head" x="1080" y="0" width="360" height="54"/>
  <rect class="lane-head" x="1440" y="0" width="360" height="54"/>

  <text class="lane-title" x="180" y="27">Người phụ trách</text>
  <text class="lane-title" x="540" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="900" y="27">Trainer</text>
  <text class="lane-title" x="1260" y="27">Interviewer</text>
  <text class="lane-title" x="1620" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="180" cy="100" rx="96" ry="28"/>
  <text class="text-dark" x="180" y="105">Bắt đầu</text>

  <rect class="task" x="30" y="160" width="300" height="64" rx="8"/>
  <text class="text-light" x="180" y="190">
    <tspan x="180" dy="0">Chọn một ứng viên</tspan>
    <tspan x="180" dy="16">từ danh sách</tspan>
  </text>

  <rect class="task" x="390" y="160" width="300" height="74" rx="8"/>
  <text class="text-light" x="540" y="190">
    <tspan x="540" dy="0">Mở màn hình Thông tin</tspan>
    <tspan x="540" dy="16">và tải các section hồ sơ</tspan>
  </text>

  <rect class="result-ok" x="1470" y="136" width="300" height="150" rx="8"/>
  <text class="text-light" x="1620" y="166">
    <tspan x="1620" dy="0">Hiển thị toàn bộ hồ sơ ứng viên</tspan>
    <tspan class="subtext" x="1620" dy="18">Email · Câu trả lời · Tổng quan · File đính kèm</tspan>
    <tspan class="meta-text" x="1620" dy="18">Item trống hiển thị hint “Nhập thêm nội dung”</tspan>
  </text>

  <rect class="task" x="30" y="360" width="300" height="74" rx="8"/>
  <text class="text-light" x="180" y="390">
    <tspan x="180" dy="0">Xem nội dung hoặc</tspan>
    <tspan x="180" dy="16">mở rộng từng item câu hỏi</tspan>
  </text>

  <polygon class="decision" points="540,470 650,540 540,610 430,540"/>
  <text class="decision-text" x="540" y="536">
    <tspan x="540" dy="0">Có chỉnh sửa</tspan>
    <tspan x="540" dy="16">dữ liệu?</tspan>
  </text>

  <rect class="result-note" x="1470" y="494" width="300" height="92" rx="8"/>
  <text class="text-light" x="1620" y="524">
    <tspan x="1620" dy="0">Tiếp tục xem hồ sơ ứng viên</tspan>
    <tspan class="subtext" x="1620" dy="18">Không phát sinh thao tác cập nhật dữ liệu</tspan>
  </text>

  <polygon class="decision" points="540,700 650,770 540,840 430,770"/>
  <text class="decision-text" x="540" y="766">
    <tspan x="540" dy="0">Là phụ trách chính</tspan>
    <tspan x="540" dy="16">khi sửa đánh giá?</tspan>
  </text>

  <rect class="result-note" x="1470" y="724" width="300" height="92" rx="8"/>
  <text class="text-light" x="1620" y="754">
    <tspan x="1620" dy="0">Chỉ xem, không sửa mục Đánh giá</tspan>
    <tspan class="subtext" x="1620" dy="18">Handler phụ không được ghi dữ liệu đánh giá</tspan>
  </text>

  <rect class="task" x="390" y="910" width="300" height="74" rx="8"/>
  <text class="text-light" x="540" y="940">
    <tspan x="540" dy="0">Lưu dữ liệu hợp lệ</tspan>
    <tspan x="540" dy="16">vào hồ sơ ứng viên</tspan>
  </text>

  <rect class="task" x="750" y="910" width="300" height="74" rx="8"/>
  <text class="text-light" x="900" y="940">
    <tspan x="900" dy="0">Trainer nhận dữ liệu</tspan>
    <tspan x="900" dy="16">hồ sơ đã đồng bộ</tspan>
  </text>

  <rect class="task" x="1110" y="910" width="300" height="74" rx="8"/>
  <text class="text-light" x="1260" y="940">
    <tspan x="1260" dy="0">Interviewer nhận dữ liệu</tspan>
    <tspan x="1260" dy="16">hồ sơ đã đồng bộ</tspan>
  </text>

  <rect class="result-ok" x="1470" y="890" width="300" height="154" rx="8"/>
  <text class="text-light" x="1620" y="920">
    <tspan x="1620" dy="0">Cập nhật dữ liệu thành công!</tspan>
    <tspan class="subtext" x="1620" dy="18">Hiển thị toast sau khi chỉnh sửa</tspan>
    <tspan class="meta-text" x="1620" dy="18">Single Source of Truth cho Handler · Trainer · Interviewer</tspan>
  </text>

  <ellipse class="start-end" cx="1620" cy="1130" rx="96" ry="28"/>
  <text class="text-dark" x="1620" y="1135">Kết thúc</text>

  <line class="line" x1="180" y1="128" x2="180" y2="160"/>
  <line class="line" x1="330" y1="192" x2="390" y2="192"/>
  <line class="line" x1="690" y1="197" x2="1470" y2="197"/>
  <path class="line" d="M540 234 V316 H180 V360"/>
  <path class="line" d="M330 397 H540 V470"/>
  <line class="line" x1="650" y1="540" x2="1470" y2="540"/>
  <line class="line" x1="540" y1="610" x2="540" y2="700"/>
  <line class="line" x1="650" y1="770" x2="1470" y2="770"/>
  <line class="line" x1="540" y1="840" x2="540" y2="910"/>
  <line class="line" x1="690" y1="947" x2="750" y2="947"/>
  <line class="line" x1="1050" y1="947" x2="1110" y2="947"/>
  <line class="line" x1="1410" y1="947" x2="1470" y2="947"/>
  <line class="line" x1="1620" y1="1044" x2="1620" y2="1102"/>

  <text class="line-label" x="708" y="526">Không</text>
  <text class="line-label" x="556" y="648">Có</text>
  <text class="line-label" x="708" y="756">Không</text>
  <text class="line-label" x="556" y="878">Có</text>
</svg>
