<svg width="1600" height="980" viewBox="0 0 1600 980" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart xem lại các đánh giá gần đây">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="926"/>
  <rect class="lane-system" x="520" y="54" width="520" height="926"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="926"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="978.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="980"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="980"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Cột Đánh giá gần đây / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="100" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="105">Bắt đầu</text>

  <rect class="task" x="120" y="160" width="280" height="74" rx="8"/>
  <text class="text-light" x="260" y="190">
    <tspan x="260" dy="0">Mở tab Đánh giá và xem</tspan>
    <tspan x="260" dy="16">cột Đánh giá gần đây</tspan>
  </text>

  <rect class="task" x="620" y="160" width="320" height="74" rx="8"/>
  <text class="text-light" x="780" y="190">
    <tspan x="780" dy="0">Tải danh sách các bản</tspan>
    <tspan x="780" dy="16">đánh giá đã lưu</tspan>
  </text>

  <polygon class="decision" points="780,300 884,374 780,448 676,374"/>
  <text class="decision-text" x="780" y="370">
    <tspan x="780" dy="0">Có lịch sử</tspan>
    <tspan x="780" dy="16">đánh giá?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="328" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="358">
    <tspan x="1320" dy="0">Không có dữ liệu!</tspan>
    <tspan class="subtext" x="1320" dy="18">Ứng viên chưa có lịch sử đánh giá</tspan>
  </text>

  <rect class="result-ok" x="1070" y="500" width="500" height="130" rx="8"/>
  <text class="text-light" x="1320" y="530">
    <tspan x="1320" dy="0">Hiển thị danh sách thẻ đánh giá</tspan>
    <tspan class="subtext" x="1320" dy="18">Tiêu đề · Tag trạng thái · Số sao trung bình</tspan>
    <tspan class="subtext" x="1320" dy="16">Người đánh giá · Ngày đánh giá</tspan>
  </text>

  <rect class="task" x="120" y="500" width="280" height="64" rx="8"/>
  <text class="text-light" x="260" y="530">
    <tspan x="260" dy="0">Click một thẻ</tspan>
    <tspan x="260" dy="16">đánh giá cụ thể</tspan>
  </text>

  <rect class="task" x="620" y="680" width="320" height="74" rx="8"/>
  <text class="text-light" x="780" y="710">
    <tspan x="780" dy="0">Tìm đúng bản đánh giá</tspan>
    <tspan x="780" dy="16">ở khu vực bên trái</tspan>
  </text>

  <rect class="result-ok" x="1070" y="660" width="500" height="138" rx="8"/>
  <text class="text-light" x="1320" y="690">
    <tspan x="1320" dy="0">Expand danh mục đánh giá tương ứng</tspan>
    <tspan class="subtext" x="1320" dy="18">Cuộn màn hình để đưa nội dung vào giữa tầm mắt</tspan>
    <tspan class="meta-text" x="1320" dy="18">Tag màu sắc, avatar và tên người đánh giá hiển thị đúng</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="900" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="905">Kết thúc</text>

  <line class="line" x1="260" y1="128" x2="260" y2="160"/>
  <line class="line" x1="400" y1="197" x2="620" y2="197"/>
  <line class="line" x1="780" y1="234" x2="780" y2="300"/>
  <line class="line" x1="884" y1="374" x2="1110" y2="374"/>
  <path class="line" d="M780 448 V480 H260 V500"/>
  <line class="line" x1="400" y1="532" x2="1070" y2="532"/>
  <path class="line" d="M260 564 V620 H780 V680"/>
  <line class="line" x1="940" y1="717" x2="1070" y2="717"/>
  <line class="line" x1="1320" y1="798" x2="1320" y2="872"/>

  <text class="line-label" x="950" y="360">Không</text>
  <text class="line-label" x="796" y="468">Có</text>
</svg>
