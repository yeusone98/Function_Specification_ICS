<svg width="1600" height="1300" viewBox="0 0 1600 1300" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart thêm ứng viên mới">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1246"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1246"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1246"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1298.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1300"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1300"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Popup / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Nhấn nút (+) tại</tspan>
    <tspan x="260" dy="16">Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="164" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="194">
    <tspan x="780" dy="0">Hiển thị popup</tspan>
    <tspan x="780" dy="16">Thêm ứng viên mới</tspan>
  </text>

  <rect class="result-ok" x="1070" y="136" width="500" height="146" rx="8"/>
  <text class="text-light" x="1320" y="166">
    <tspan x="1320" dy="0">Popup Thêm ứng viên mới</tspan>
    <tspan class="subtext" x="1320" dy="18">Họ và tên · Vị trí · Gmail · Ngày gửi CV</tspan>
    <tspan class="subtext" x="1320" dy="16">Cho phép upload thêm file thông tin ứng viên</tspan>
    <tspan class="meta-text" x="1320" dy="18">Tổng dung lượng upload tối đa 25MB</tspan>
  </text>

  <rect class="task" x="620" y="356" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="386">
    <tspan x="780" dy="0">Lấy danh sách vị trí</tspan>
    <tspan x="780" dy="16">đang tuyển dụng</tspan>
  </text>

  <polygon class="decision" points="780,498 884,572 780,646 676,572"/>
  <text class="decision-text" x="780" y="568">
    <tspan x="780" dy="0">Có vị trí</tspan>
    <tspan x="780" dy="16">khả dụng?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="526" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="556">
    <tspan x="1320" dy="0">Không có vị trí khả dụng!</tspan>
    <tspan class="subtext" x="1320" dy="18">Dropdown vị trí trả về empty state</tspan>
  </text>

  <rect class="task" x="120" y="732" width="280" height="86" rx="8"/>
  <text class="text-light" x="260" y="776">
    <tspan x="260" dy="0">Nhập Họ tên · Vị trí · Gmail</tspan>
    <tspan x="260" dy="16">Ngày gửi CV và upload file nếu cần</tspan>
  </text>

  <rect class="task" x="620" y="740" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="770">
    <tspan x="780" dy="0">Kiểm tra dữ liệu</tspan>
    <tspan x="780" dy="16">email unique + ngày gửi hợp lệ</tspan>
  </text>

  <polygon class="decision" points="780,884 884,958 780,1032 676,958"/>
  <text class="decision-text" x="780" y="954">
    <tspan x="780" dy="0">Dữ liệu</tspan>
    <tspan x="780" dy="16">hợp lệ?</tspan>
  </text>

  <rect class="result-note" x="1110" y="912" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="942">
    <tspan x="1320" dy="0">Hiển thị lỗi validate</tspan>
    <tspan class="subtext" x="1320" dy="18">Email đã tồn tại / sai định dạng / ngày gửi không hợp lệ</tspan>
  </text>

  <rect class="task" x="120" y="1114" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="1140">
    <tspan x="260" dy="0">Nhấn nút</tspan>
    <tspan x="260" dy="16">Thêm ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="1110" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="1140">
    <tspan x="780" dy="0">Lưu hồ sơ ứng viên mới</tspan>
    <tspan x="780" dy="16">và cập nhật bảng dữ liệu</tspan>
  </text>

  <rect class="result-ok" x="1070" y="1082" width="500" height="118" rx="8"/>
  <text class="text-light" x="1320" y="1112">
    <tspan x="1320" dy="0">Hiển thị ứng viên mới trên bảng</tspan>
    <tspan class="subtext" x="1320" dy="18">Record vừa tạo xuất hiện tại Danh sách ứng viên</tspan>
    <tspan class="meta-text" x="1320" dy="18">Hoàn tất thao tác thêm ứng viên</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1256" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1261">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="400" y1="199" x2="620" y2="199"/>
  <line class="line" x1="940" y1="199" x2="1070" y2="199"/>
  <line class="line" x1="780" y1="234" x2="780" y2="356"/>
  <line class="line" x1="780" y1="426" x2="780" y2="498"/>
  <line class="line" x1="884" y1="572" x2="1110" y2="572"/>
  <line class="line" x1="780" y1="646" x2="780" y2="740"/>
  <line class="line" x1="400" y1="775" x2="620" y2="775"/>
  <line class="line" x1="780" y1="810" x2="780" y2="884"/>
  <line class="line" x1="884" y1="958" x2="1110" y2="958"/>
  <line class="line" x1="780" y1="1032" x2="780" y2="1110"/>
  <line class="line" x1="400" y1="1145" x2="620" y2="1145"/>
  <line class="line" x1="940" y1="1145" x2="1070" y2="1145"/>
  <line class="line" x1="1320" y1="1200" x2="1320" y2="1228"/>

  <text class="line-label" x="950" y="558">Không</text>
  <text class="line-label" x="796" y="680">Có</text>
  <text class="line-label" x="950" y="944">Không</text>
  <text class="line-label" x="796" y="1056">Có</text>
</svg>
