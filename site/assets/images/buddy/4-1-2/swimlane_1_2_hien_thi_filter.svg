<svg width="1600" height="1620" viewBox="0 0 1600 1620" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart mục 1.2">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-master { fill: #ef9f27; opacity: 0.08; }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .legend-card { fill: #1f2937; stroke: #506b89; stroke-width: 1; }
      .legend-title {
        fill: #ffffff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
      }
      .legend-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-dashed {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 7 4;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-master" x="0" y="54" width="400" height="1566"/>
  <rect class="lane-handler" x="400" y="54" width="400" height="1566"/>
  <rect class="lane-system" x="800" y="54" width="400" height="1566"/>
  <rect class="lane-result" x="1200" y="54" width="400" height="1566"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1618.8"/>
  <line class="divider" x1="400" y1="0" x2="400" y2="1620"/>
  <line class="divider" x1="800" y1="0" x2="800" y2="1620"/>
  <line class="divider" x1="1200" y1="0" x2="1200" y2="1620"/>

  <rect class="lane-head" x="0" y="0" width="400" height="54"/>
  <rect class="lane-head" x="400" y="0" width="400" height="54"/>
  <rect class="lane-head" x="800" y="0" width="400" height="54"/>
  <rect class="lane-head" x="1200" y="0" width="400" height="54"/>

  <text class="lane-title" x="200" y="27">Master</text>
  <text class="lane-title" x="600" y="27">Người phụ trách</text>
  <text class="lane-title" x="1000" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1400" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="600" cy="112" rx="96" ry="28"/>
  <text class="text-dark" x="600" y="117">Bắt đầu</text>

  <rect class="task" x="500" y="174" width="200" height="62" rx="8"/>
  <text class="text-light" x="600" y="200">
    <tspan x="600" dy="0">Đang xem bảng</tspan>
    <tspan x="600" dy="16">Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="500" y="292" width="200" height="62" rx="8"/>
  <text class="text-light" x="600" y="318">
    <tspan x="600" dy="0">Nhấn nút</tspan>
    <tspan x="600" dy="16">☰ Hiển thị</tspan>
  </text>

  <rect class="task" x="860" y="292" width="280" height="62" rx="8"/>
  <text class="text-light" x="1000" y="318">
    <tspan x="1000" dy="0">Lấy danh sách filter</tspan>
    <tspan x="1000" dy="16">định nghĩa sẵn</tspan>
  </text>

  <rect class="task" x="100" y="380" width="200" height="72" rx="8"/>
  <text class="text-light" x="200" y="406">
    <tspan x="200" dy="0">Gán quyền quản lý</tspan>
    <tspan x="200" dy="16">vị trí tuyển dụng</tspan>
    <tspan x="200" dy="16">cho Handler</tspan>
  </text>

  <rect class="task" x="860" y="390" width="280" height="62" rx="8"/>
  <text class="text-light" x="1000" y="416">
    <tspan x="1000" dy="0">Giới hạn filter theo</tspan>
    <tspan x="1000" dy="16">vị trí được phân quyền</tspan>
  </text>

  <polygon class="decision" points="1000,500 1094,570 1000,640 906,570"/>
  <text class="decision-text" x="1000" y="566">
    <tspan x="1000" dy="0">Có filter</tspan>
    <tspan x="1000" dy="16">khả dụng?</tspan>
  </text>

  <rect class="result-empty" x="1260" y="539" width="280" height="62" rx="8"/>
  <text class="text-light" x="1400" y="565">
    <tspan x="1400" dy="0">Popup HIỂN THỊ FILTER</tspan>
    <tspan x="1400" dy="16">Không có dữ liệu!</tspan>
  </text>

  <rect class="task" x="1230" y="690" width="330" height="124" rx="8"/>
  <text class="text-light" x="1395" y="716">
    <tspan x="1395" dy="0">Popup HIỂN THỊ FILTER</tspan>
    <tspan class="subtext" x="1395" dy="18">Checkbox: Vị trí · Trạng thái</tspan>
    <tspan class="subtext" x="1395" dy="16">Người phụ trách · Người đào tạo</tspan>
    <tspan class="subtext" x="1395" dy="16">Loại HĐ · Ngày phỏng vấn</tspan>
    <tspan class="meta-text" x="1395" dy="18">Hủy bỏ / Xác nhận</tspan>
  </text>

  <rect class="task" x="500" y="856" width="220" height="70" rx="8"/>
  <text class="text-light" x="610" y="886">
    <tspan x="610" dy="0">Check / uncheck</tspan>
    <tspan x="610" dy="16">các filter</tspan>
  </text>

  <rect class="task" x="860" y="860" width="280" height="62" rx="8"/>
  <text class="text-light" x="1000" y="886">
    <tspan x="1000" dy="0">So sánh thay đổi</tspan>
    <tspan x="1000" dy="16">checkbox state</tspan>
  </text>

  <polygon class="decision" points="1000,1016 1094,1086 1000,1156 906,1086"/>
  <text class="decision-text" x="1000" y="1082">
    <tspan x="1000" dy="0">Có thay đổi</tspan>
    <tspan x="1000" dy="16">state?</tspan>
  </text>

  <rect class="result-note" x="1260" y="1054" width="280" height="68" rx="8"/>
  <text class="text-light" x="1400" y="1082">
