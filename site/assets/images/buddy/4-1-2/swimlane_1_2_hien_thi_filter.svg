    <tspan class="subtext" x="1400" dy="18">Chưa có thay đổi state, tiếp tục chọn</tspan>
  </text>

  <rect class="result-ok" x="1260" y="1196" width="280" height="68" rx="8"/>
  <text class="text-light" x="1400" y="1224">
    <tspan x="1400" dy="0">Nút Xác nhận enabled</tspan>
    <tspan class="subtext" x="1400" dy="18">Có thay đổi checkbox state</tspan>
  </text>

  <rect class="task" x="500" y="1260" width="220" height="70" rx="8"/>
  <text class="text-light" x="610" y="1290">
    <tspan x="610" dy="0">Nhấn nút</tspan>
    <tspan x="610" dy="16">Xác nhận</tspan>
  </text>

  <rect class="task" x="860" y="1260" width="280" height="70" rx="8"/>
  <text class="text-light" x="1000" y="1290">
    <tspan x="1000" dy="0">Cập nhật Filter bar</tspan>
    <tspan x="1000" dy="16">&amp; lưu User Preferences</tspan>
  </text>

  <rect class="result-ok" x="1230" y="1398" width="330" height="130" rx="8"/>
  <text class="text-light" x="1395" y="1424">
    <tspan x="1395" dy="0">Hiển thị Filter bar mới</tspan>
    <tspan class="subtext" x="1395" dy="18">Filter đã chọn xuất hiện</tspan>
    <tspan class="subtext" x="1395" dy="16">Filter bỏ chọn biến mất</tspan>
    <tspan class="subtext" x="1395" dy="16">Áp dụng ngay trên bảng ứng viên</tspan>
    <tspan class="meta-text" x="1395" dy="18">Ghi nhớ cho lần đăng nhập sau</tspan>
  </text>

  <rect class="task" x="460" y="1418" width="280" height="86" rx="8"/>
  <text class="text-light" x="600" y="1464">
    <tspan x="600" dy="0">Xem kết quả hiển thị</tspan>
    <tspan x="600" dy="16">trên popup / filter bar</tspan>
  </text>

  <ellipse class="start-end" cx="600" cy="1576" rx="96" ry="28"/>
  <text class="text-dark" x="600" y="1581">Kết thúc</text>

  <line class="line" x1="600" y1="140" x2="600" y2="174"/>
  <line class="line" x1="600" y1="236" x2="600" y2="292"/>
  <line class="line" x1="700" y1="323" x2="860" y2="323"/>
  <line class="line" x1="1000" y1="354" x2="1000" y2="390"/>
  <path class="line-dashed" d="M300 416 H352 V421 H860"/>
  <line class="line" x1="1000" y1="452" x2="1000" y2="500"/>
  <path class="line-dashed" d="M1094 570 H1260"/>
  <path class="line" d="M1000 640 V752 H1230"/>
  <path class="line" d="M1395 814 V836 H610 V856"/>
  <line class="line" x1="720" y1="891" x2="860" y2="891"/>
  <line class="line" x1="1000" y1="922" x2="1000" y2="1016"/>
  <path class="line-dashed" d="M1094 1086 H1260"/>
  <path class="line" d="M1000 1156 V1230 H1260"/>
  <path class="line" d="M1260 1230 H610 V1260"/>
  <line class="line" x1="720" y1="1295" x2="860" y2="1295"/>
  <path class="line" d="M1140 1295 H1180 V1463 H1230"/>
  <line class="line" x1="1230" y1="1448" x2="740" y2="1448"/>
  <path class="line" d="M1540 570 H1580 V1540 H760 V1496 H740"/>
  <line class="line" x1="600" y1="1504" x2="600" y2="1548"/>

  <text class="line-label" x="404" y="404">Phạm vi filter</text>
  <text class="line-label" x="1162" y="556">Không</text>
  <text class="line-label" x="1012" y="680">Có</text>
  <text class="line-label" x="1002" y="824">Chọn filter</text>
  <text class="line-label" x="1162" y="1072">Không</text>
  <text class="line-label" x="1012" y="1196">Có</text>

  <rect class="legend-card" x="72" y="1322" width="268" height="250" rx="12"/>
  <text class="legend-title" x="96" y="1360">Chú thích</text>

  <ellipse class="start-end" cx="104" cy="1392" rx="16" ry="10"/>
  <text class="legend-text" x="144" y="1396">Start / End</text>

  <rect class="task" x="88" y="1418" width="32" height="18" rx="4"/>
  <text class="legend-text" x="144" y="1431">Task</text>

  <polygon class="decision" points="104,1452 122,1465 104,1478 86,1465"/>
  <text class="legend-text" x="144" y="1469">Decision</text>

  <rect class="result-empty" x="88" y="1492" width="32" height="18" rx="4"/>
