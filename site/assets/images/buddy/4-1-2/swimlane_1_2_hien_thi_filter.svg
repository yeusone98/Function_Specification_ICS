  <line class="line" x1="86" y1="1532" x2="118" y2="1532"/>
  <text class="legend-text" x="144" y="1536">Luồng chính</text>

  <line class="line-dashed" x1="86" y1="1560" x2="118" y2="1560"/>
  <text class="legend-text" x="144" y="1564">Luồng điều kiện / phụ</text>
</svg>
