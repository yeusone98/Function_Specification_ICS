<svg width="1800" height="980" viewBox="0 0 1800 980" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart quản lý tài liệu đào tạo">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.08; }
      .lane-system { fill: #378add; opacity: 0.11; }
      .lane-trainer { fill: #378add; opacity: 0.09; }
      .lane-trainee { fill: #378add; opacity: 0.09; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-error { fill: #e54848; stroke: #b52f2f; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #f5a623; stroke: #d97706; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #3b2400;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #55b8ff;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #8fd2ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 5px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#55b8ff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="450" height="926"/>
  <rect class="lane-system" x="450" y="54" width="450" height="926"/>
  <rect class="lane-trainer" x="900" y="54" width="450" height="926"/>
  <rect class="lane-trainee" x="1350" y="54" width="450" height="926"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="978.8"/>
  <line class="divider" x1="450" y1="0" x2="450" y2="980"/>
  <line class="divider" x1="900" y1="0" x2="900" y2="980"/>
  <line class="divider" x1="1350" y1="0" x2="1350" y2="980"/>

  <rect class="lane-head" x="0" y="0" width="450" height="54"/>
  <rect class="lane-head" x="450" y="0" width="450" height="54"/>
  <rect class="lane-head" x="900" y="0" width="450" height="54"/>
  <rect class="lane-head" x="1350" y="0" width="450" height="54"/>

  <text class="lane-title" x="225" y="27">Người phụ trách</text>
  <text class="lane-title" x="675" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1125" y="27">Người đào tạo</text>
  <text class="lane-title" x="1575" y="27">Người được đào tạo</text>

  <ellipse class="start-end" cx="225" cy="102" rx="96" ry="28"/>
  <text class="text-dark" x="225" y="107">Bắt đầu</text>

  <rect class="task" x="75" y="160" width="300" height="86" rx="8"/>
  <text class="text-light" x="225" y="192">
    <tspan x="225" dy="0">Chọn vị trí</tspan>
    <tspan x="225" dy="16">và mở tab Tài liệu</tspan>
  </text>

  <rect class="task" x="525" y="158" width="300" height="90" rx="8"/>
  <text class="text-light" x="675" y="192">
    <tspan x="675" dy="0">Tải danh sách bộ tài liệu</tspan>
    <tspan x="675" dy="16">và danh mục nội dung</tspan>
  </text>

  <polygon class="decision" points="675,270 785,330 675,390 565,330"/>
  <text class="decision-text" x="675" y="334">
    <tspan x="675" dy="0">Có bộ tài liệu?</tspan>
  </text>

  <rect class="result-error" x="960" y="276" width="320" height="108" rx="8"/>
  <text class="text-light" x="1120" y="308">
    <tspan x="1120" dy="0">Danh sách tài liệu trống</tspan>
    <tspan class="subtext" x="1120" dy="18">Hiển thị ô nhập tên tài liệu mới</tspan>
    <tspan class="meta-text" x="1120" dy="18">Kèm biểu tượng thùng rỗng</tspan>
  </text>

  <rect class="task" x="75" y="450" width="300" height="92" rx="8"/>
  <text class="text-light" x="225" y="482">
    <tspan x="225" dy="0">Nhập tên tài liệu mới</tspan>
    <tspan x="225" dy="16">hoặc đổi tên + [ENTER]</tspan>
  </text>

  <rect class="task" x="525" y="450" width="300" height="92" rx="8"/>
  <text class="text-light" x="675" y="482">
    <tspan x="675" dy="0">Lưu bộ tài liệu</tspan>
    <tspan class="subtext" x="675" dy="18">và mở bộ vừa thao tác</tspan>
    <tspan class="meta-text" x="675" dy="18">Không cho phép tên rỗng</tspan>
  </text>

  <rect class="task" x="75" y="630" width="300" height="104" rx="8"/>
  <text class="text-light" x="225" y="662">
    <tspan x="225" dy="0">Thêm / sửa / xóa danh mục</tspan>
    <tspan x="225" dy="16">và action Hướng Dẫn</tspan>
    <tspan class="meta-text" x="225" dy="18">Nhập nội dung chi tiết: Văn bản / file / URL</tspan>
  </text>

  <rect class="task" x="525" y="630" width="300" height="104" rx="8"/>
  <text class="text-light" x="675" y="662">
    <tspan x="675" dy="0">Lưu nội dung tài liệu</tspan>
    <tspan class="subtext" x="675" dy="18">và trạng thái kích hoạt / vô hiệu</tspan>
    <tspan class="meta-text" x="675" dy="18">Xóa bộ tài liệu / danh mục: có popup xác nhận</tspan>
  </text>

  <rect class="result-ok" x="960" y="630" width="320" height="104" rx="8"/>
  <text class="text-light" x="1120" y="662">
    <tspan x="1120" dy="0">Người đào tạo thấy</tspan>
    <tspan class="subtext" x="1120" dy="18">tài liệu đang kích hoạt</tspan>
    <tspan class="meta-text" x="1120" dy="18">Nội dung bị vô hiệu sẽ bị ẩn</tspan>
  </text>

  <rect class="result-ok" x="1410" y="630" width="320" height="104" rx="8"/>
  <text class="text-light" x="1570" y="662">
    <tspan x="1570" dy="0">Người được đào tạo thấy</tspan>
    <tspan class="subtext" x="1570" dy="18">tài liệu đang công khai</tspan>
    <tspan class="meta-text" x="1570" dy="18">Không thấy tài liệu bị vô hiệu</tspan>
  </text>

  <ellipse class="start-end" cx="1570" cy="860" rx="96" ry="28"/>
  <text class="text-dark" x="1570" y="865">Kết thúc</text>

  <line class="line" x1="225" y1="130" x2="225" y2="160"/>
  <line class="line" x1="375" y1="203" x2="525" y2="203"/>
  <line class="line" x1="675" y1="248" x2="675" y2="270"/>
  <line class="line" x1="785" y1="330" x2="960" y2="330"/>
  <path class="line" d="M1120 384 V412 H225 V450"/>
  <line class="line" x1="675" y1="390" x2="675" y2="450"/>
  <line class="line" x1="375" y1="496" x2="525" y2="496"/>
  <path class="line" d="M675 542 V586 H225 V630"/>
  <line class="line" x1="375" y1="682" x2="525" y2="682"/>
  <line class="line" x1="825" y1="682" x2="960" y2="682"/>
  <line class="line" x1="1280" y1="682" x2="1410" y2="682"/>
  <line class="line" x1="1570" y1="734" x2="1570" y2="832"/>

  <text class="line-label" x="450" y="189">Mở tab</text>
  <text class="line-label" x="874" y="316">Không</text>
  <text class="line-label" x="710" y="420">Có</text>
</svg>
