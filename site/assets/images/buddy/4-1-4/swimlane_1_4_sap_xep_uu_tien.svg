<svg width="1600" height="1320" viewBox="0 0 1600 1320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart sắp xếp thứ tự ưu tiên theo từng cột">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1266"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1266"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1266"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1318.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1320"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1320"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Mở một bộ lọc</tspan>
    <tspan x="260" dy="16">trên Filter bar</tspan>
  </text>

  <polygon class="decision" points="260,298 364,372 260,446 156,372"/>
  <text class="decision-text" x="260" y="368">
    <tspan x="260" dy="0">Nhấn</tspan>
    <tspan x="260" dy="16">⟳ reset?</tspan>
  </text>

  <rect class="task" x="620" y="336" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="366">
    <tspan x="780" dy="0">Xóa bộ lọc và đưa</tspan>
    <tspan x="780" dy="16">thứ tự hiển thị về mặc định</tspan>
  </text>

  <rect class="result-ok" x="1070" y="320" width="500" height="118" rx="8"/>
  <text class="text-light" x="1320" y="350">
    <tspan x="1320" dy="0">Hiển thị danh sách mặc định</tspan>
    <tspan class="subtext" x="1320" dy="18">Bỏ bộ lọc và ưu tiên sort của cột đã reset</tspan>
    <tspan class="meta-text" x="1320" dy="18">Trả về trạng thái hệ thống mặc định</tspan>
  </text>

  <rect class="task" x="120" y="548" width="280" height="70" rx="8"/>
  <text class="text-light" x="260" y="578">
    <tspan x="260" dy="0">Tích chọn Item</tspan>
    <tspan x="260" dy="16">theo thứ tự mong muốn</tspan>
  </text>

  <rect class="task" x="620" y="548" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="578">
    <tspan x="780" dy="0">Ghi nhận thứ tự click</tspan>
    <tspan x="780" dy="16">của từng Item</tspan>
  </text>

  <rect class="task" x="620" y="672" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="702">
    <tspan x="780" dy="0">Áp dụng ưu tiên theo</tspan>
    <tspan x="780" dy="16">thứ tự cột trái sang phải</tspan>
  </text>

  <rect class="task" x="620" y="796" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="826">
    <tspan x="780" dy="0">Gửi request filter + sort</tspan>
    <tspan x="780" dy="16">theo thứ tự đã chọn</tspan>
  </text>

  <polygon class="decision" points="780,938 884,1012 780,1086 676,1012"/>
  <text class="decision-text" x="780" y="1008">
    <tspan x="780" dy="0">Có ứng viên</tspan>
    <tspan x="780" dy="16">khớp?</tspan>
  </text>

  <rect class="result-empty" x="1110" y="966" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="996">
    <tspan x="1320" dy="0">Bảng dữ liệu trống!</tspan>
    <tspan class="subtext" x="1320" dy="18">Không có ứng viên khớp Item đã chọn</tspan>
  </text>

  <rect class="result-ok" x="1070" y="1110" width="500" height="118" rx="8"/>
  <text class="text-light" x="1320" y="1140">
    <tspan x="1320" dy="0">Hiển thị danh sách đã sort / filter</tspan>
    <tspan class="subtext" x="1320" dy="18">Item chọn trước có ưu tiên cao hơn Item chọn sau</tspan>
    <tspan class="meta-text" x="1320" dy="18">Nhiều bộ lọc: ưu tiên theo thứ tự cột trái sang phải</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1276" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1281">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="260" y1="230" x2="260" y2="298"/>
  <line class="line" x1="364" y1="372" x2="620" y2="372"/>
  <line class="line" x1="940" y1="371" x2="1070" y2="371"/>
  <line class="line" x1="260" y1="446" x2="260" y2="548"/>
  <line class="line" x1="400" y1="583" x2="620" y2="583"/>
  <line class="line" x1="780" y1="618" x2="780" y2="672"/>
  <line class="line" x1="780" y1="742" x2="780" y2="796"/>
  <line class="line" x1="780" y1="866" x2="780" y2="938"/>
  <line class="line" x1="884" y1="1012" x2="1110" y2="1012"/>
  <path class="line" d="M780 1086 V1169 H1070"/>
  <line class="line" x1="1320" y1="1228" x2="1320" y2="1248"/>

  <text class="line-label" x="452" y="358">Có</text>
  <text class="line-label" x="274" y="488">Không</text>
  <text class="line-label" x="948" y="998">Không</text>
  <text class="line-label" x="796" y="1118">Có</text>
</svg>
