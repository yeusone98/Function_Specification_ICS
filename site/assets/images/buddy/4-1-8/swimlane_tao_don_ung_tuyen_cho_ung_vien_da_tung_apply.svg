<svg width="1600" height="1500" viewBox="0 0 1600 1500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart tạo đơn ứng tuyển cho ứng viên đã từng apply">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1446"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1446"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1446"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1498.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1500"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1500"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Popup / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Nhấn nút (+) tại</tspan>
    <tspan x="260" dy="16">Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="164" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="194">
    <tspan x="780" dy="0">Hiển thị popup</tspan>
    <tspan x="780" dy="16">Thêm ứng viên mới</tspan>
  </text>

  <rect class="result-ok" x="1070" y="136" width="500" height="146" rx="8"/>
  <text class="text-light" x="1320" y="166">
    <tspan x="1320" dy="0">Popup Thêm ứng viên mới</tspan>
    <tspan class="subtext" x="1320" dy="18">Vị trí · Gmail · Ngày gửi CV và các trường bắt buộc</tspan>
    <tspan class="subtext" x="1320" dy="16">Email cũ sẽ dùng để tạo hồ sơ ứng tuyển mới</tspan>
    <tspan class="meta-text" x="1320" dy="18">Cho phép upload thêm file ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="336" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="366">
    <tspan x="780" dy="0">Kiểm tra danh sách vị trí</tspan>
    <tspan x="780" dy="16">đang tuyển dụng</tspan>
  </text>

  <polygon class="decision" points="780,426 884,500 780,574 676,500"/>
  <text class="decision-text" x="780" y="496">
    <tspan x="780" dy="0">Có vị trí</tspan>
    <tspan x="780" dy="16">khả dụng?</tspan>
  </text>

  <rect class="result-empty" x="1070" y="446" width="500" height="108" rx="8"/>
  <text class="text-light" x="1320" y="476">
    <tspan x="1320" dy="0">Không có vị trí khả dụng!</tspan>
    <tspan class="subtext" x="1320" dy="18">Dropdown vị trí hiển thị empty state</tspan>
  </text>

  <rect class="task" x="120" y="632" width="280" height="86" rx="8"/>
  <text class="text-light" x="260" y="676">
    <tspan x="260" dy="0">Nhập vị trí, Gmail</tspan>
    <tspan x="260" dy="16">Ngày gửi CV và dữ liệu còn lại</tspan>
  </text>

  <rect class="task" x="620" y="636" width="320" height="78" rx="8"/>
  <text class="text-light" x="780" y="666">
    <tspan x="780" dy="0">Kiểm tra dữ liệu và nhận diện</tspan>
    <tspan x="780" dy="16">email đã tồn tại trên hệ thống</tspan>
  </text>

  <rect class="task" x="120" y="812" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="838">
    <tspan x="260" dy="0">Nhấn nút</tspan>
    <tspan x="260" dy="16">Thêm ứng viên</tspan>
  </text>

  <rect class="task" x="620" y="804" width="320" height="78" rx="8"/>
  <text class="text-light" x="780" y="834">
    <tspan x="780" dy="0">Kiểm tra đơn ứng tuyển gần nhất</tspan>
    <tspan x="780" dy="16">đã hoàn thành hay chưa</tspan>
  </text>

  <polygon class="decision" points="780,906 884,980 780,1054 676,980"/>
  <text class="decision-text" x="780" y="976">
    <tspan x="780" dy="0">Đơn gần nhất</tspan>
    <tspan x="780" dy="16">đã hoàn thành?</tspan>
  </text>

  <rect class="result-note" x="1070" y="922" width="500" height="116" rx="8"/>
  <text class="text-light" x="1320" y="952">
    <tspan x="1320" dy="0">Cảnh báo đơn cũ chưa hoàn thành</tspan>
    <tspan class="subtext" x="1320" dy="18">Hiển thị link đến hồ sơ ứng tuyển đang mở</tspan>
    <tspan class="meta-text" x="1320" dy="18">Cần đánh giá hoặc xóa đơn cũ trước khi tạo mới</tspan>
  </text>

  <rect class="task" x="120" y="1088" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="1114">
    <tspan x="260" dy="0">Xác nhận tạo</tspan>
    <tspan x="260" dy="16">đơn ứng tuyển mới</tspan>
  </text>

  <rect class="task" x="620" y="1084" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="1114">
    <tspan x="780" dy="0">Lưu hồ sơ ứng tuyển mới</tspan>
    <tspan x="780" dy="16">cho ứng viên đã tồn tại</tspan>
  </text>

  <rect class="result-ok" x="1070" y="1176" width="500" height="118" rx="8"/>
  <text class="text-light" x="1320" y="1206">
    <tspan x="1320" dy="0">Hiển thị ứng viên trên bảng dữ liệu</tspan>
    <tspan class="subtext" x="1320" dy="18">Tạo hồ sơ ứng tuyển mới trên tài khoản hiện có</tspan>
    <tspan class="meta-text" x="1320" dy="18">Hoàn tất tạo đơn ứng tuyển lại / đa vị trí</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1394" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1399">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="400" y1="199" x2="620" y2="199"/>
  <line class="line" x1="940" y1="199" x2="1070" y2="199"/>
  <line class="line" x1="780" y1="234" x2="780" y2="336"/>
  <line class="line" x1="780" y1="406" x2="780" y2="426"/>
  <line class="line" x1="884" y1="500" x2="1070" y2="500"/>
  <path class="line" d="M780 574 V604 H260 V632"/>
  <line class="line" x1="400" y1="675" x2="620" y2="675"/>
  <path class="line" d="M780 714 V780 H260 V812"/>
  <line class="line" x1="400" y1="843" x2="620" y2="843"/>
  <line class="line" x1="780" y1="882" x2="780" y2="906"/>
  <line class="line" x1="884" y1="980" x2="1070" y2="980"/>
  <path class="line" d="M780 1054 V1066 H260 V1088"/>
  <line class="line" x1="400" y1="1119" x2="620" y2="1119"/>
  <path class="line" d="M780 1154 V1235 H1070"/>
  <line class="line" x1="1320" y1="1294" x2="1320" y2="1366"/>

  <text class="line-label" x="950" y="486">Không</text>
  <text class="line-label" x="796" y="600">Có</text>
  <text class="line-label" x="950" y="966">Không</text>
  <text class="line-label" x="796" y="1072">Có</text>
</svg>
