<svg width="1600" height="1360" viewBox="0 0 1600 1360" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart quản lý thông tin chi tiết của ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="520" height="1306"/>
  <rect class="lane-system" x="520" y="54" width="520" height="1306"/>
  <rect class="lane-result" x="1040" y="54" width="560" height="1306"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1598.8" height="1358.8"/>
  <line class="divider" x1="520" y1="0" x2="520" y2="1360"/>
  <line class="divider" x1="1040" y1="0" x2="1040" y2="1360"/>

  <rect class="lane-head" x="0" y="0" width="520" height="54"/>
  <rect class="lane-head" x="520" y="0" width="520" height="54"/>
  <rect class="lane-head" x="1040" y="0" width="560" height="54"/>

  <text class="lane-title" x="260" y="27">Người phụ trách</text>
  <text class="lane-title" x="780" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1320" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="260" cy="108" rx="96" ry="28"/>
  <text class="text-dark" x="260" y="113">Bắt đầu</text>

  <rect class="task" x="120" y="168" width="280" height="62" rx="8"/>
  <text class="text-light" x="260" y="194">
    <tspan x="260" dy="0">Chọn một ứng viên</tspan>
    <tspan x="260" dy="16">từ danh sách</tspan>
  </text>

  <rect class="task" x="620" y="164" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="194">
    <tspan x="780" dy="0">Mở màn hình Thông tin</tspan>
    <tspan x="780" dy="16">và hiển thị sidebar submenu</tspan>
  </text>

  <rect class="result-ok" x="1070" y="136" width="500" height="146" rx="8"/>
  <text class="text-light" x="1320" y="166">
    <tspan x="1320" dy="0">Hiển thị toàn bộ hồ sơ ứng viên</tspan>
    <tspan class="subtext" x="1320" dy="18">Email · Câu trả lời · Tổng quan · Gán người phụ trách</tspan>
    <tspan class="subtext" x="1320" dy="16">Hình ảnh · File đính kèm và các section liên quan</tspan>
    <tspan class="meta-text" x="1320" dy="18">Item không có dữ liệu hiển thị hint “Nhập thêm nội dung”</tspan>
  </text>

  <rect class="task" x="120" y="394" width="280" height="70" rx="8"/>
  <text class="text-light" x="260" y="424">
    <tspan x="260" dy="0">Xem nội dung hoặc</tspan>
    <tspan x="260" dy="16">mở rộng từng item câu hỏi</tspan>
  </text>

  <polygon class="decision" points="780,412 884,486 780,560 676,486"/>
  <text class="decision-text" x="780" y="482">
    <tspan x="780" dy="0">Có chỉnh sửa</tspan>
    <tspan x="780" dy="16">dữ liệu?</tspan>
  </text>

  <rect class="result-note" x="1110" y="444" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="474">
    <tspan x="1320" dy="0">Tiếp tục xem thông tin ứng viên</tspan>
    <tspan class="subtext" x="1320" dy="18">Không phát sinh thao tác cập nhật dữ liệu</tspan>
  </text>

  <polygon class="decision" points="780,652 884,726 780,800 676,726"/>
  <text class="decision-text" x="780" y="722">
    <tspan x="780" dy="0">Là phụ trách</tspan>
    <tspan x="780" dy="16">chính?</tspan>
  </text>

  <rect class="result-note" x="1110" y="684" width="420" height="92" rx="8"/>
  <text class="text-light" x="1320" y="714">
    <tspan x="1320" dy="0">Chỉ xem, không chỉnh sửa đánh giá</tspan>
    <tspan class="subtext" x="1320" dy="18">Người phụ trách phụ không được ghi dữ liệu đánh giá</tspan>
  </text>

  <rect class="task" x="620" y="926" width="320" height="70" rx="8"/>
  <text class="text-light" x="780" y="956">
    <tspan x="780" dy="0">Cập nhật dữ liệu và</tspan>
    <tspan x="780" dy="16">đồng bộ sang các role liên quan</tspan>
  </text>

  <rect class="result-ok" x="1070" y="900" width="500" height="152" rx="8"/>
  <text class="text-light" x="1320" y="930">
    <tspan x="1320" dy="0">Cập nhật dữ liệu thành công!</tspan>
    <tspan class="subtext" x="1320" dy="18">Hiển thị toast sau khi chỉnh sửa</tspan>
    <tspan class="subtext" x="1320" dy="16">Dữ liệu đồng bộ cho Handler · Trainer · Interviewer</tspan>
    <tspan class="meta-text" x="1320" dy="18">Single Source of Truth</tspan>
  </text>

  <ellipse class="start-end" cx="1320" cy="1116" rx="96" ry="28"/>
  <text class="text-dark" x="1320" y="1121">Kết thúc</text>

  <line class="line" x1="260" y1="136" x2="260" y2="168"/>
  <line class="line" x1="400" y1="199" x2="620" y2="199"/>
  <line class="line" x1="940" y1="199" x2="1070" y2="199"/>
  <path class="line" d="M1070 230 H260 V394"/>
  <line class="line" x1="400" y1="429" x2="676" y2="486"/>
  <line class="line" x1="884" y1="486" x2="1110" y2="486"/>
  <line class="line" x1="780" y1="560" x2="780" y2="652"/>
  <line class="line" x1="884" y1="726" x2="1110" y2="726"/>
  <line class="line" x1="780" y1="800" x2="780" y2="926"/>
  <line class="line" x1="940" y1="961" x2="1070" y2="961"/>
  <line class="line" x1="1320" y1="1052" x2="1320" y2="1088"/>

  <text class="line-label" x="948" y="472">Không</text>
  <text class="line-label" x="796" y="596">Có</text>
  <text class="line-label" x="948" y="712">Không</text>
  <text class="line-label" x="796" y="832">Có</text>
</svg>
