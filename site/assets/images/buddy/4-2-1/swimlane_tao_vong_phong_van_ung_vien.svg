<svg width="1800" height="1440" viewBox="0 0 1800 1440" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart tạo vòng phỏng vấn ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-role { fill: #378add; opacity: 0.07; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="360" height="1386"/>
  <rect class="lane-system" x="360" y="54" width="360" height="1386"/>
  <rect class="lane-role" x="720" y="54" width="360" height="1386"/>
  <rect class="lane-role" x="1080" y="54" width="360" height="1386"/>
  <rect class="lane-result" x="1440" y="54" width="360" height="1386"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1438.8"/>
  <line class="divider" x1="360" y1="0" x2="360" y2="1440"/>
  <line class="divider" x1="720" y1="0" x2="720" y2="1440"/>
  <line class="divider" x1="1080" y1="0" x2="1080" y2="1440"/>
  <line class="divider" x1="1440" y1="0" x2="1440" y2="1440"/>

  <rect class="lane-head" x="0" y="0" width="360" height="54"/>
  <rect class="lane-head" x="360" y="0" width="360" height="54"/>
  <rect class="lane-head" x="720" y="0" width="360" height="54"/>
  <rect class="lane-head" x="1080" y="0" width="360" height="54"/>
  <rect class="lane-head" x="1440" y="0" width="360" height="54"/>

  <text class="lane-title" x="180" y="27">Người phụ trách</text>
  <text class="lane-title" x="540" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="900" y="27">Người phỏng vấn</text>
  <text class="lane-title" x="1260" y="27">Ứng viên</text>
  <text class="lane-title" x="1620" y="27">Lịch phỏng vấn / Popup / Kết quả</text>

  <ellipse class="start-end" cx="180" cy="100" rx="96" ry="28"/>
  <text class="text-dark" x="180" y="105">Bắt đầu</text>

  <rect class="task" x="30" y="160" width="300" height="64" rx="8"/>
  <text class="text-light" x="180" y="190">
    <tspan x="180" dy="0">Chọn một ứng viên</tspan>
    <tspan x="180" dy="16">trong Danh sách ứng viên</tspan>
  </text>

  <rect class="task" x="390" y="160" width="300" height="74" rx="8"/>
  <text class="text-light" x="540" y="190">
    <tspan x="540" dy="0">Điều hướng tới chi tiết ứng viên</tspan>
    <tspan x="540" dy="16">và mặc định mở tab Thông tin</tspan>
  </text>

  <rect class="task" x="30" y="320" width="300" height="64" rx="8"/>
  <text class="text-light" x="180" y="350">
    <tspan x="180" dy="0">Chọn tab</tspan>
    <tspan x="180" dy="16">Phỏng vấn</tspan>
  </text>

  <rect class="task" x="390" y="312" width="300" height="88" rx="8"/>
  <text class="text-light" x="540" y="342">
    <tspan x="540" dy="0">Tải các vòng phỏng vấn</tspan>
    <tspan x="540" dy="16">đã thiết lập sẵn cho vị trí tuyển dụng</tspan>
  </text>

  <polygon class="decision" points="540,460 650,530 540,600 430,530"/>
  <text class="decision-text" x="540" y="526">
    <tspan x="540" dy="0">Có vòng phỏng vấn</tspan>
    <tspan x="540" dy="16">được tạo sẵn?</tspan>
  </text>

  <rect class="result-empty" x="1470" y="484" width="300" height="92" rx="8"/>
  <text class="text-light" x="1620" y="514">
    <tspan x="1620" dy="0">Không có dữ liệu!</tspan>
    <tspan class="subtext" x="1620" dy="18">Không có vòng phỏng vấn nào được thiết lập sẵn</tspan>
  </text>

  <rect class="task" x="30" y="690" width="300" height="88" rx="8"/>
  <text class="text-light" x="180" y="720">
    <tspan x="180" dy="0">Chọn một vòng phỏng vấn</tspan>
    <tspan x="180" dy="16">chưa được gán người phỏng vấn và thời gian</tspan>
  </text>

  <rect class="task" x="30" y="840" width="300" height="64" rx="8"/>
  <text class="text-light" x="180" y="870">
    <tspan x="180" dy="0">Mở dropdown</tspan>
    <tspan x="180" dy="16">Người phỏng vấn</tspan>
  </text>

  <rect class="task" x="390" y="832" width="300" height="74" rx="8"/>
  <text class="text-light" x="540" y="862">
    <tspan x="540" dy="0">Tải danh sách ít nhất</tspan>
    <tspan x="540" dy="16">một hoặc nhiều người phỏng vấn</tspan>
  </text>

  <polygon class="decision" points="540,980 650,1050 540,1120 430,1050"/>
  <text class="decision-text" x="540" y="1046">
    <tspan x="540" dy="0">Có người phỏng vấn</tspan>
    <tspan x="540" dy="16">khả dụng?</tspan>
  </text>

  <rect class="result-empty" x="1470" y="1004" width="300" height="92" rx="8"/>
  <text class="text-light" x="1620" y="1034">
    <tspan x="1620" dy="0">Không có dữ liệu!</tspan>
    <tspan class="subtext" x="1620" dy="18">Dropdown Người phỏng vấn không có lựa chọn</tspan>
  </text>

  <rect class="task" x="30" y="1170" width="300" height="118" rx="8"/>
  <text class="text-light" x="180" y="1204">
    <tspan x="180" dy="0">Chọn người phỏng vấn,</tspan>
    <tspan x="180" dy="16">ngày giờ và trạng thái</tspan>
    <tspan x="180" dy="16">rồi nhấn Xác nhận</tspan>
  </text>

  <rect class="task" x="390" y="1180" width="300" height="88" rx="8"/>
  <text class="text-light" x="540" y="1214">
    <tspan x="540" dy="0">Lưu dữ liệu và</tspan>
    <tspan x="540" dy="16">kích hoạt vòng phỏng vấn</tspan>
  </text>

  <rect class="task" x="750" y="1180" width="300" height="88" rx="8"/>
  <text class="text-light" x="900" y="1214">
    <tspan x="900" dy="0">Người phỏng vấn</tspan>
    <tspan x="900" dy="16">nhận lịch phỏng vấn mới</tspan>
  </text>

  <rect class="task" x="1110" y="1180" width="300" height="88" rx="8"/>
  <text class="text-light" x="1260" y="1214">
    <tspan x="1260" dy="0">Ứng viên nhận thông tin</tspan>
    <tspan x="1260" dy="16">về vòng phỏng vấn mới</tspan>
  </text>

  <rect class="result-ok" x="1470" y="1160" width="300" height="154" rx="8"/>
  <text class="text-light" x="1620" y="1190">
    <tspan x="1620" dy="0">Lịch phỏng vấn được cập nhật</tspan>
    <tspan class="subtext" x="1620" dy="18">Hiển thị người phỏng vấn và thời gian trên vòng vừa kích hoạt</tspan>
    <tspan class="meta-text" x="1620" dy="18">Nếu có 2 vòng liên tiếp, popup hiển thị thêm vòng tiếp theo</tspan>
  </text>

  <ellipse class="start-end" cx="1620" cy="1370" rx="96" ry="28"/>
  <text class="text-dark" x="1620" y="1375">Kết thúc</text>

  <line class="line" x1="180" y1="128" x2="180" y2="160"/>
  <line class="line" x1="330" y1="192" x2="390" y2="192"/>
  <path class="line" d="M540 234 V290 H180 V320"/>
  <line class="line" x1="330" y1="352" x2="390" y2="352"/>
  <line class="line" x1="540" y1="400" x2="540" y2="460"/>
  <line class="line" x1="650" y1="530" x2="1470" y2="530"/>
  <path class="line" d="M540 600 V650 H180 V690"/>
  <line class="line" x1="180" y1="778" x2="180" y2="840"/>
  <line class="line" x1="330" y1="872" x2="390" y2="872"/>
  <line class="line" x1="540" y1="906" x2="540" y2="980"/>
  <line class="line" x1="650" y1="1050" x2="1470" y2="1050"/>
  <path class="line" d="M540 1120 V1148 H180 V1170"/>
  <line class="line" x1="330" y1="1229" x2="390" y2="1229"/>
  <line class="line" x1="690" y1="1224" x2="750" y2="1224"/>
  <line class="line" x1="1050" y1="1224" x2="1110" y2="1224"/>
  <line class="line" x1="1410" y1="1224" x2="1470" y2="1224"/>
  <line class="line" x1="1620" y1="1314" x2="1620" y2="1342"/>

  <text class="line-label" x="708" y="516">Không</text>
  <text class="line-label" x="556" y="628">Có</text>
  <text class="line-label" x="708" y="1036">Không</text>
  <text class="line-label" x="556" y="1140">Có</text>
</svg>
