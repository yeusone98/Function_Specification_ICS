<svg width="1800" height="1260" viewBox="0 0 1800 1260" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart đánh giá ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-handler { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-role { fill: #378add; opacity: 0.07; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-empty { fill: #e24b4a; stroke: #a32d2d; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-handler" x="0" y="54" width="450" height="1206"/>
  <rect class="lane-system" x="450" y="54" width="450" height="1206"/>
  <rect class="lane-role" x="900" y="54" width="450" height="1206"/>
  <rect class="lane-result" x="1350" y="54" width="450" height="1206"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1258.8"/>
  <line class="divider" x1="450" y1="0" x2="450" y2="1260"/>
  <line class="divider" x1="900" y1="0" x2="900" y2="1260"/>
  <line class="divider" x1="1350" y1="0" x2="1350" y2="1260"/>

  <rect class="lane-head" x="0" y="0" width="450" height="54"/>
  <rect class="lane-head" x="450" y="0" width="450" height="54"/>
  <rect class="lane-head" x="900" y="0" width="450" height="54"/>
  <rect class="lane-head" x="1350" y="0" width="450" height="54"/>

  <text class="lane-title" x="225" y="27">Người phụ trách</text>
  <text class="lane-title" x="675" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1125" y="27">Handler phụ</text>
  <text class="lane-title" x="1575" y="27">Tab Đánh giá / Kết quả</text>

  <ellipse class="start-end" cx="225" cy="100" rx="96" ry="28"/>
  <text class="text-dark" x="225" y="105">Bắt đầu</text>

  <rect class="task" x="75" y="160" width="300" height="64" rx="8"/>
  <text class="text-light" x="225" y="190">
    <tspan x="225" dy="0">Mở tab</tspan>
    <tspan x="225" dy="16">Đánh giá</tspan>
  </text>

  <rect class="task" x="525" y="160" width="300" height="74" rx="8"/>
  <text class="text-light" x="675" y="190">
    <tspan x="675" dy="0">Tải bộ tiêu chí đánh giá</tspan>
    <tspan x="675" dy="16">theo vị trí ứng tuyển</tspan>
  </text>

  <polygon class="decision" points="675,290 785,360 675,430 565,360"/>
  <text class="decision-text" x="675" y="356">
    <tspan x="675" dy="0">Có tiêu chí</tspan>
    <tspan x="675" dy="16">đánh giá?</tspan>
  </text>

  <rect class="result-empty" x="1425" y="314" width="300" height="92" rx="8"/>
  <text class="text-light" x="1575" y="344">
    <tspan x="1575" dy="0">Vị trí này chưa có</tspan>
    <tspan x="1575" dy="16">tiêu chí đánh giá!</tspan>
  </text>

  <polygon class="decision" points="675,540 785,610 675,680 565,610"/>
  <text class="decision-text" x="675" y="606">
    <tspan x="675" dy="0">Là Handler</tspan>
    <tspan x="675" dy="16">chính?</tspan>
  </text>

  <rect class="task" x="975" y="574" width="300" height="72" rx="8"/>
  <text class="text-light" x="1125" y="604">
    <tspan x="1125" dy="0">Xem nội dung đánh giá</tspan>
    <tspan x="1125" dy="16">của Handler chính</tspan>
  </text>

  <rect class="result-note" x="1425" y="564" width="300" height="92" rx="8"/>
  <text class="text-light" x="1575" y="594">
    <tspan x="1575" dy="0">Form đánh giá ở chế độ Read-only</tspan>
    <tspan class="subtext" x="1575" dy="18">Handler phụ chỉ xem, không lưu chỉnh sửa</tspan>
  </text>

  <rect class="task" x="75" y="760" width="300" height="74" rx="8"/>
  <text class="text-light" x="225" y="790">
    <tspan x="225" dy="0">Nhập tiêu đề, chấm sao</tspan>
    <tspan x="225" dy="16">và chọn tiêu chí chi tiết</tspan>
  </text>

  <rect class="task" x="75" y="884" width="300" height="88" rx="8"/>
  <text class="text-light" x="225" y="918">
    <tspan x="225" dy="0">Nhập nội dung đánh giá</tspan>
    <tspan x="225" dy="16">rồi nhấn Lưu đánh giá</tspan>
  </text>

  <rect class="task" x="525" y="900" width="300" height="74" rx="8"/>
  <text class="text-light" x="675" y="930">
    <tspan x="675" dy="0">Lưu dữ liệu đánh giá</tspan>
    <tspan x="675" dy="16">vào hệ thống</tspan>
  </text>

  <rect class="task" x="975" y="900" width="300" height="74" rx="8"/>
  <text class="text-light" x="1125" y="930">
    <tspan x="1125" dy="0">Handler phụ xem được</tspan>
    <tspan x="1125" dy="16">đánh giá mới nhất</tspan>
  </text>

  <rect class="result-ok" x="1395" y="880" width="360" height="150" rx="8"/>
  <text class="text-light" x="1575" y="910">
    <tspan x="1575" dy="0">Đánh giá được lưu thành công</tspan>
    <tspan class="subtext" x="1575" dy="18">Xuất hiện đầu danh sách Đánh giá gần đây</tspan>
    <tspan class="meta-text" x="1575" dy="18">Handler chính và phụ đều xem được nội dung mới nhất</tspan>
  </text>

  <ellipse class="start-end" cx="1575" cy="1160" rx="96" ry="28"/>
  <text class="text-dark" x="1575" y="1165">Kết thúc</text>

  <line class="line" x1="225" y1="128" x2="225" y2="160"/>
  <line class="line" x1="375" y1="192" x2="525" y2="192"/>
  <line class="line" x1="675" y1="234" x2="675" y2="290"/>
  <line class="line" x1="785" y1="360" x2="1425" y2="360"/>
  <line class="line" x1="675" y1="430" x2="675" y2="540"/>
  <line class="line" x1="785" y1="610" x2="975" y2="610"/>
  <line class="line" x1="1275" y1="610" x2="1425" y2="610"/>
  <path class="line" d="M675 680 V720 H225 V760"/>
  <line class="line" x1="225" y1="834" x2="225" y2="884"/>
  <line class="line" x1="375" y1="937" x2="525" y2="937"/>
  <line class="line" x1="825" y1="937" x2="975" y2="937"/>
  <line class="line" x1="1275" y1="937" x2="1395" y2="937"/>
  <line class="line" x1="1575" y1="1030" x2="1575" y2="1132"/>

  <text class="line-label" x="820" y="346">Không</text>
  <text class="line-label" x="691" y="458">Có</text>
  <text class="line-label" x="810" y="596">Không</text>
  <text class="line-label" x="691" y="708">Có</text>
</svg>
