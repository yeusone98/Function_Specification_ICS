<svg width="1800" height="1160" viewBox="0 0 1800 1160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart xem thông tin tổng quan về vị trí tuyển dụng">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-master { fill: #378add; opacity: 0.06; }
      .lane-handler { fill: #378add; opacity: 0.08; }
      .lane-system { fill: #378add; opacity: 0.11; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-master" x="0" y="54" width="450" height="1106"/>
  <rect class="lane-handler" x="450" y="54" width="450" height="1106"/>
  <rect class="lane-system" x="900" y="54" width="450" height="1106"/>
  <rect class="lane-result" x="1350" y="54" width="450" height="1106"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1158.8"/>
  <line class="divider" x1="450" y1="0" x2="450" y2="1160"/>
  <line class="divider" x1="900" y1="0" x2="900" y2="1160"/>
  <line class="divider" x1="1350" y1="0" x2="1350" y2="1160"/>

  <rect class="lane-head" x="0" y="0" width="450" height="54"/>
  <rect class="lane-head" x="450" y="0" width="450" height="54"/>
  <rect class="lane-head" x="900" y="0" width="450" height="54"/>
  <rect class="lane-head" x="1350" y="0" width="450" height="54"/>

  <text class="lane-title" x="225" y="27">Master</text>
  <text class="lane-title" x="675" y="27">Người phụ trách</text>
  <text class="lane-title" x="1125" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1575" y="27">Tổng quan vị trí / Kết quả</text>

  <ellipse class="start-end" cx="225" cy="102" rx="96" ry="28"/>
  <text class="text-dark" x="225" y="107">Bắt đầu</text>

  <rect class="task" x="65" y="160" width="320" height="72" rx="8"/>
  <text class="text-light" x="225" y="190">
    <tspan x="225" dy="0">Gán quyền truy cập</tspan>
    <tspan x="225" dy="16">vị trí tuyển dụng cho Handler</tspan>
  </text>

  <rect class="task" x="515" y="160" width="320" height="82" rx="8"/>
  <text class="text-light" x="675" y="192">
    <tspan x="675" dy="0">Chọn một vị trí trong</tspan>
    <tspan x="675" dy="16">Danh sách vị trí ứng tuyển</tspan>
  </text>

  <rect class="task" x="965" y="160" width="320" height="82" rx="8"/>
  <text class="text-light" x="1125" y="192">
    <tspan x="1125" dy="0">Hiển thị sidebar mới</tspan>
    <tspan x="1125" dy="16">chứa các submenu của vị trí</tspan>
  </text>

  <rect class="task" x="515" y="352" width="320" height="72" rx="8"/>
  <text class="text-light" x="675" y="382">
    <tspan x="675" dy="0">Chọn submenu</tspan>
    <tspan x="675" dy="16">Tổng quan</tspan>
  </text>

  <rect class="task" x="965" y="344" width="320" height="88" rx="8"/>
  <text class="text-light" x="1125" y="378">
    <tspan x="1125" dy="0">Tải dữ liệu tổng quan</tspan>
    <tspan x="1125" dy="16">của vị trí tuyển dụng</tspan>
  </text>

  <rect class="result-ok" x="1385" y="286" width="380" height="320" rx="8"/>
  <text class="text-light" x="1575" y="316">
    <tspan x="1575" dy="0">Hiển thị màn hình Tổng quan vị trí</tspan>
    <tspan class="subtext" x="1575" dy="20">Tên vị trí · icon vị trí</tspan>
    <tspan class="subtext" x="1575" dy="18">Biểu đồ: CV · Phỏng vấn · Pass PV</tspan>
    <tspan class="subtext" x="1575" dy="16">Training · Thử việc</tspan>
    <tspan class="meta-text" x="1575" dy="20">Có nút 📅 để đổi khoảng thời gian xem</tspan>
    <tspan class="meta-text" x="1575" dy="16">Nếu chưa có dữ liệu: biểu đồ vẫn hiển thị 0</tspan>
    <tspan class="meta-text" x="1575" dy="14">Biểu đồ đường nằm trùng trục X</tspan>
    <tspan class="meta-text" x="1575" dy="14">Các nút sửa / trạng thái / xóa bị vô hiệu hóa</tspan>
  </text>

  <ellipse class="start-end" cx="1575" cy="760" rx="96" ry="28"/>
  <text class="text-dark" x="1575" y="765">Kết thúc</text>

  <line class="line" x1="225" y1="130" x2="225" y2="160"/>
  <line class="line" x1="385" y1="196" x2="515" y2="196"/>
  <line class="line" x1="835" y1="201" x2="965" y2="201"/>
  <path class="line" d="M1125 242 V298 H675 V352"/>
  <line class="line" x1="835" y1="388" x2="965" y2="388"/>
  <line class="line" x1="1285" y1="388" x2="1385" y2="388"/>
  <line class="line" x1="1575" y1="606" x2="1575" y2="732"/>

  <text class="line-label" x="448" y="178">Phân quyền</text>
</svg>
