<svg width="1800" height="1040" viewBox="0 0 1800 1040" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Swimlane chart quản lý HĐLĐ với ứng viên">
  <defs>
    <style>
      .outer-border { fill: none; stroke: #b5d4f4; stroke-width: 1.2; }
      .divider { stroke: #b5d4f4; stroke-width: 1; }
      .lane-head { fill: #185fa5; }
      .lane-title {
        fill: #e8f2fb;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .lane-actor { fill: #378add; opacity: 0.06; }
      .lane-system { fill: #378add; opacity: 0.10; }
      .lane-role { fill: #378add; opacity: 0.07; }
      .lane-result { fill: #6b7280; opacity: 0.08; }
      .task { fill: #378add; stroke: #185fa5; stroke-width: 1; }
      .result-ok { fill: #1d9e75; stroke: #0f6e56; stroke-width: 1; }
      .result-note { fill: #5f6f82; stroke: #405062; stroke-width: 1; }
      .start-end { fill: #5dcaa5; stroke: #0f6e56; stroke-width: 1.2; }
      .decision { fill: #ef9f27; stroke: #854f0b; stroke-width: 1; }
      .text-light {
        fill: #eef6ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
      }
      .text-dark {
        fill: #07342c;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .decision-text {
        fill: #4e2c04;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
      .subtext {
        fill: #d8eeff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        text-anchor: middle;
      }
      .meta-text {
        fill: #d6e6f6;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
      }
      .line {
        fill: none;
        stroke: #378add;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .line-label {
        fill: #61b3ff;
        font-family: "SF Pro Text", "Inter", "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 700;
        paint-order: stroke;
        stroke: rgba(10, 18, 34, 0.92);
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1.5 1.5L8 5L1.5 8.5" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="lane-actor" x="0" y="54" width="450" height="986"/>
  <rect class="lane-system" x="450" y="54" width="450" height="986"/>
  <rect class="lane-role" x="900" y="54" width="450" height="986"/>
  <rect class="lane-result" x="1350" y="54" width="450" height="986"/>

  <rect class="outer-border" x="0.6" y="0.6" width="1798.8" height="1038.8"/>
  <line class="divider" x1="450" y1="0" x2="450" y2="1040"/>
  <line class="divider" x1="900" y1="0" x2="900" y2="1040"/>
  <line class="divider" x1="1350" y1="0" x2="1350" y2="1040"/>

  <rect class="lane-head" x="0" y="0" width="450" height="54"/>
  <rect class="lane-head" x="450" y="0" width="450" height="54"/>
  <rect class="lane-head" x="900" y="0" width="450" height="54"/>
  <rect class="lane-head" x="1350" y="0" width="450" height="54"/>

  <text class="lane-title" x="225" y="27">Người phụ trách</text>
  <text class="lane-title" x="675" y="27">Hệ thống PLS Buddy+</text>
  <text class="lane-title" x="1125" y="27">Trainee</text>
  <text class="lane-title" x="1575" y="27">Màn hình / Kết quả</text>

  <ellipse class="start-end" cx="225" cy="100" rx="96" ry="28"/>
  <text class="text-dark" x="225" y="105">Bắt đầu</text>

  <rect class="task" x="75" y="160" width="300" height="64" rx="8"/>
  <text class="text-light" x="225" y="190">
    <tspan x="225" dy="0">Mở tab</tspan>
    <tspan x="225" dy="16">Hợp Đồng</tspan>
  </text>

  <rect class="task" x="525" y="160" width="300" height="74" rx="8"/>
  <text class="text-light" x="675" y="190">
    <tspan x="675" dy="0">Tải form Thông Tin Hợp Đồng</tspan>
    <tspan x="675" dy="16">và dữ liệu hiện có nếu đã lưu</tspan>
  </text>

  <rect class="result-note" x="1425" y="136" width="300" height="142" rx="8"/>
  <text class="text-light" x="1575" y="166">
    <tspan x="1575" dy="0">Form hợp đồng hiển thị</tspan>
    <tspan class="subtext" x="1575" dy="18">Ngày tháng theo định dạng dd/mm/yyyy</tspan>
    <tspan class="meta-text" x="1575" dy="18">Nếu chưa có HĐ: form trống và không có tệp đính kèm</tspan>
  </text>

  <rect class="task" x="75" y="340" width="300" height="74" rx="8"/>
  <text class="text-light" x="225" y="370">
    <tspan x="225" dy="0">Chọn loại hợp đồng</tspan>
    <tspan x="225" dy="16">từ dropdown</tspan>
  </text>

  <polygon class="decision" points="675,460 785,530 675,600 565,530"/>
  <text class="decision-text" x="675" y="526">
    <tspan x="675" dy="0">Là HĐ</tspan>
    <tspan x="675" dy="16">Chính thức?</tspan>
  </text>

  <rect class="result-note" x="1425" y="484" width="300" height="102" rx="8"/>
  <text class="text-light" x="1575" y="514">
    <tspan x="1575" dy="0">Khóa toàn bộ form nhập liệu</tspan>
    <tspan class="subtext" x="1575" dy="18">UI chuyển xám và không thể chỉnh sửa</tspan>
  </text>

  <rect class="task" x="75" y="690" width="300" height="124" rx="8"/>
  <text class="text-light" x="225" y="724">
    <tspan x="225" dy="0">Nhập thông tin hợp đồng</tspan>
    <tspan x="225" dy="16">xem lương bằng icon Con mắt</tspan>
    <tspan x="225" dy="16">upload hoặc xóa tệp đính kèm</tspan>
  </text>

  <rect class="task" x="525" y="720" width="300" height="74" rx="8"/>
  <text class="text-light" x="675" y="750">
    <tspan x="675" dy="0">Lưu dữ liệu hợp đồng</tspan>
    <tspan x="675" dy="16">và ghi nhận thay đổi</tspan>
  </text>

  <rect class="task" x="975" y="720" width="300" height="74" rx="8"/>
  <text class="text-light" x="1125" y="750">
    <tspan x="1125" dy="0">Trainee xem nội dung hợp đồng</tspan>
    <tspan x="1125" dy="16">đã được phép công khai</tspan>
  </text>

  <rect class="result-ok" x="1425" y="700" width="300" height="176" rx="8"/>
  <text class="text-light" x="1575" y="730">
    <tspan x="1575" dy="0">HĐLĐ được hiển thị và lưu thành công</tspan>
    <tspan class="subtext" x="1575" dy="18">Thumbnail tệp đính kèm hiển thị kèm tên file</tspan>
    <tspan class="meta-text" x="1575" dy="18">Nội dung hợp đồng được mở cho</tspan>
    <tspan class="meta-text" x="1575" dy="16">các bên liên quan theo quyền xem</tspan>
  </text>

  <ellipse class="start-end" cx="1575" cy="950" rx="96" ry="28"/>
  <text class="text-dark" x="1575" y="955">Kết thúc</text>

  <line class="line" x1="225" y1="128" x2="225" y2="160"/>
  <line class="line" x1="375" y1="192" x2="525" y2="192"/>
  <line class="line" x1="825" y1="197" x2="1425" y2="197"/>
  <path class="line" d="M675 234 V300 H225 V340"/>
  <path class="line" d="M375 377 H675 V460"/>
  <line class="line" x1="785" y1="530" x2="1425" y2="530"/>
  <path class="line" d="M675 600 V640 H225 V690"/>
  <line class="line" x1="375" y1="752" x2="525" y2="752"/>
  <line class="line" x1="825" y1="757" x2="975" y2="757"/>
  <line class="line" x1="1275" y1="757" x2="1425" y2="757"/>
  <line class="line" x1="1575" y1="876" x2="1575" y2="922"/>

  <text class="line-label" x="818" y="516">Có</text>
  <text class="line-label" x="691" y="628">Không</text>
</svg>
